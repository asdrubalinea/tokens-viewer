<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f7f3ec" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0f0d0a" media="(prefers-color-scheme: dark)" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Tokens" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" href="icons/icon-192.png" />
  <title>Token Viewer</title>

  <script>(function(){
    try {
      var stored = localStorage.getItem('tv.theme');
      var mode = stored && stored !== 'auto'
        ? stored
        : (matchMedia('(prefers-color-scheme: dark)').matches ? 'ink' : 'paper');
      document.documentElement.dataset.theme = mode;
      if (stored) document.documentElement.dataset.themeChoice = stored;
    } catch (_) {
      document.documentElement.dataset.theme = 'paper';
    }
  })();</script>

  <link rel="stylesheet" data-hljs-theme="paper" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github.min.css" />
  <link rel="stylesheet" data-hljs-theme="ink" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css" />

  <style>
    :root {
      --font-serif: "Iowan Old Style", "Source Serif Pro", ui-serif, Georgia, "Times New Roman", serif;
      --font-sans:  -apple-system, BlinkMacSystemFont, "Inter", system-ui, "Helvetica Neue", sans-serif;
      --font-mono:  ui-monospace, "JetBrains Mono", "SF Mono", "Cascadia Code", Menlo, monospace;

      --size-meta:  12px;
      --size-body:  17px;
      --lh-body:    1.7;
      --lh-heading: 1.3;

      --r-sm:  4px;
      --r-md:  6px;
      --r-lg:  10px;

      --gap-tight: 8px;
      --gap-cozy:  16px;
      --gap-loose: 24px;
      --gap-msg:   40px;

      --col: 72ch;
    }

    :root[data-theme="paper"] {
      --bg:           #f7f3ec;
      --surface:      #efe7d6;
      --surface-2:    #e6dcc6;
      --text:         #1a1612;
      --text-dim:     #5a544a;
      --text-dimmer:  #8a8275;
      --accent:       #8b3a2a;
      --accent-2:     #355c4a;
      --rule:         #d8cfbe;
      --rule-strong:  #bfb39c;
      --danger:       #a3361c;
      --selection:    rgba(139, 58, 42, 0.18);
      --shadow-1:     0 1px 0 rgba(20,18,12,0.04);
      --shadow-2:     0 1px 0 rgba(20,18,12,0.04), 0 4px 12px rgba(20,18,12,0.06);
    }

    :root[data-theme="ink"] {
      --bg:           #0f0d0a;
      --surface:      #16130f;
      --surface-2:    #1d1914;
      --text:         #ece4d2;
      --text-dim:     #a39884;
      --text-dimmer:  #6a604f;
      --accent:       #d4a574;
      --accent-2:     #8ab39a;
      --rule:         #2a251e;
      --rule-strong:  #3c352a;
      --danger:       #e08a72;
      --selection:    rgba(212, 165, 116, 0.22);
      --shadow-1:     0 1px 0 rgba(0,0,0,0.4);
      --shadow-2:     0 1px 0 rgba(0,0,0,0.4), 0 8px 24px rgba(0,0,0,0.3);
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    html {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 16px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -webkit-text-size-adjust: 100%;
      text-rendering: optimizeLegibility;
    }
    body {
      min-height: 100dvh;
      overflow-x: hidden;
    }
    ::selection { background: var(--selection); }

    button { font: inherit; color: inherit; }

    /* ---- Topbar ---- */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      background: var(--bg);
      border-bottom: 1px solid var(--rule);
      padding-top: max(14px, env(safe-area-inset-top));
      padding-right: 24px;
      padding-bottom: 14px;
      padding-left: 24px;
    }
    .topbar-row {
      display: grid;
      grid-template-columns: auto 1fr auto auto;
      grid-template-areas: "brand filters search actions";
      gap: var(--gap-loose);
      align-items: center;
      max-width: 1100px;
      margin: 0 auto;
    }
    .brand-wrap {
      grid-area: brand;
      display: flex;
      align-items: baseline;
      gap: 14px;
      min-width: 0;
    }
    .brand {
      font-family: var(--font-serif);
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text);
      white-space: nowrap;
    }
    .brand small {
      font-family: var(--font-sans);
      font-weight: 400;
      font-size: 11px;
      color: var(--text-dimmer);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-left: 10px;
    }
    .stats {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-dimmer);
      letter-spacing: 0.04em;
      white-space: nowrap;
    }
    .stats strong {
      color: var(--text-dim);
      font-weight: 500;
    }
    .actions {
      grid-area: actions;
      display: flex;
      align-items: center;
      gap: var(--gap-cozy);
    }

    /* Ghost text buttons (Open / Export / Theme) */
    .text-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 2px;
      font-family: var(--font-sans);
      font-size: 13px;
      font-weight: 500;
      color: var(--text-dim);
      background: transparent;
      border: none;
      cursor: pointer;
      letter-spacing: 0.01em;
      transition: color 0.15s;
    }
    .text-btn:hover { color: var(--accent); }
    .text-btn input[type="file"] { display: none; }
    .text-btn.dirty::after {
      content: "";
      display: inline-block;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent);
      margin-left: 4px;
    }

    .theme-toggle {
      display: inline-grid;
      place-items: center;
      width: 28px;
      height: 28px;
      padding: 0;
      background: transparent;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      border-radius: var(--r-md);
      transition: color 0.15s, background 0.15s;
    }
    .theme-toggle:hover { color: var(--accent); }
    .theme-toggle svg { width: 16px; height: 16px; }
    :root[data-theme="paper"] .theme-toggle .ico-ink   { display: none; }
    :root[data-theme="ink"]   .theme-toggle .ico-paper { display: none; }

    /* ---- Filters ---- */
    .filters {
      grid-area: filters;
      justify-self: start;
      display: flex;
      align-items: baseline;
      gap: 10px;
      flex-wrap: wrap;
    }
    .filters .sep {
      color: var(--rule-strong);
      font-size: 11px;
      user-select: none;
    }
    .filter {
      font-family: var(--font-sans);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-dim);
      background: transparent;
      border: none;
      padding: 4px 0;
      cursor: pointer;
      text-decoration: underline 1px solid transparent;
      text-underline-offset: 5px;
      transition: color 0.15s, text-decoration-color 0.15s;
      white-space: nowrap;
    }
    .filter:hover { color: var(--text); }
    .filter.active {
      color: var(--text);
      text-decoration-color: var(--accent);
    }

    /* ---- Search ---- */
    .search-wrap {
      grid-area: search;
      position: relative;
      width: 240px;
      max-width: 100%;
    }
    .search-wrap input {
      width: 100%;
      padding: 6px 4px 6px 22px;
      font-family: var(--font-sans);
      font-size: 16px;
      color: var(--text);
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--rule);
      outline: none;
      transition: border-color 0.15s;
    }
    @media (min-width: 641px) {
      .search-wrap input { font-size: 13px; }
    }
    .search-wrap input:focus { border-bottom-color: var(--text-dim); }
    .search-wrap input::placeholder { color: var(--text-dimmer); }
    .search-wrap::before {
      content: "";
      position: absolute;
      left: 2px; top: 50%; transform: translateY(-50%);
      width: 13px; height: 13px;
      background: no-repeat center / contain url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%238a8275' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round'><circle cx='11' cy='11' r='7'/><line x1='21' y1='21' x2='16.65' y2='16.65'/></svg>");
      pointer-events: none;
    }

    /* ---- Progress ---- */
    .progress {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 12px 20px 10px;
      background: var(--bg);
      border-bottom: 1px solid var(--rule);
    }
    .progress[hidden] { display: none; }
    .progress .label {
      font-size: 11px;
      color: var(--text-dim);
      margin-bottom: 6px;
      font-family: var(--font-sans);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .progress .track {
      height: 1px;
      background: var(--rule);
      overflow: hidden;
    }
    .progress .bar {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width 0.2s ease-out;
    }

    /* ---- Main / Empty state ---- */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 48px 24px;
      padding-bottom: max(96px, calc(env(safe-area-inset-bottom) + 80px));
    }
    body.dragging::after {
      content: "Drop conversation file here";
      position: fixed;
      inset: 0;
      z-index: 200;
      background: color-mix(in oklab, var(--bg) 85%, var(--accent));
      border: 2px dashed var(--accent);
      display: grid;
      place-items: center;
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 28px;
      color: var(--accent);
      pointer-events: none;
    }

    .empty {
      max-width: var(--col);
      margin: 80px auto;
      text-align: center;
    }
    .empty h1 {
      font-family: var(--font-serif);
      font-size: clamp(32px, 5vw, 46px);
      font-weight: 500;
      letter-spacing: -0.015em;
      color: var(--text);
      margin: 0 0 20px;
      line-height: 1.15;
    }
    .empty h1 em {
      color: var(--accent);
      font-style: italic;
      font-weight: 400;
    }
    .empty p {
      font-family: var(--font-serif);
      font-size: 17px;
      color: var(--text-dim);
      max-width: 52ch;
      margin: 0 auto 36px;
      line-height: 1.65;
    }
    .empty .drop-zone {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 4px 0;
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 500;
      color: var(--accent);
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--accent);
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .empty .drop-zone:hover { opacity: 0.75; }
    .empty .drop-zone svg { width: 16px; height: 16px; }
    .empty .drop-zone input { display: none; }
    .empty .meta {
      margin-top: 28px;
      font-size: 11px;
      color: var(--text-dimmer);
      font-family: var(--font-sans);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* ---- Conversation ---- */
    .conversation {
      display: flex;
      flex-direction: column;
      gap: var(--gap-msg);
      max-width: var(--col);
      margin: 0 auto;
    }
    .msg {
      position: relative;
      padding: 0;
      background: transparent;
      border: none;
    }
    @media (min-width: 641px) {
      .msg {
        content-visibility: auto;
        contain-intrinsic-size: auto 420px;
      }
    }
    .msg.hidden { display: none; }
    .msg.msg-drive-image {
      text-align: center;
    }
    .msg:hover .msg-meta { color: var(--text); }

    .msg-meta {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 14px;
      font-family: var(--font-sans);
      font-size: var(--size-meta);
      color: var(--text-dim);
      transition: color 0.15s;
    }
    .msg-meta .role {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 500;
      color: var(--text-dimmer);
    }
    .msg[data-role="user"]  .msg-meta .role { color: var(--accent); }
    .msg[data-role="model"] .msg-meta .role { color: var(--accent-2); }
    .msg-meta .sep {
      color: var(--rule-strong);
      user-select: none;
    }
    .msg-meta time {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: color 0.15s;
    }
    .msg-meta time:hover { color: var(--text); }
    .msg-meta .tokens {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-dimmer);
      letter-spacing: 0.04em;
    }
    .msg-meta .goto {
      font-family: var(--font-mono);
      font-size: 13px;
      line-height: 1;
      color: var(--text-dimmer);
      background: transparent;
      border: none;
      padding: 2px 4px;
      cursor: pointer;
      transition: color 0.15s;
    }
    .msg-meta .goto:hover { color: var(--accent); }

    /* ---- Thinking blocks (<details>) ---- */
    details.thinking {
      border-left: 2px solid var(--rule);
      padding-left: var(--gap-cozy);
      margin: 8px 0 0;
    }
    details.thinking[open] {
      border-left-color: var(--rule-strong);
      padding-top: 4px;
      padding-bottom: 4px;
    }
    details.thinking summary {
      list-style: none;
      cursor: pointer;
      font-family: var(--font-sans);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-dimmer);
      padding: 4px 0;
      display: flex;
      align-items: baseline;
      gap: 8px;
      transition: color 0.15s;
    }
    details.thinking summary::-webkit-details-marker { display: none; }
    details.thinking summary::marker { content: ''; }
    details.thinking summary:hover { color: var(--text-dim); }
    details.thinking summary .chev {
      display: inline-block;
      font-size: 9px;
      color: var(--text-dimmer);
      transition: transform 0.15s;
    }
    details.thinking[open] summary .chev { transform: rotate(90deg); }
    details.thinking summary .tok {
      margin-left: auto;
      color: var(--text-dimmer);
      letter-spacing: 0.04em;
    }
    details.thinking .thinking-body {
      margin-top: 10px;
      color: var(--text-dim);
      font-style: italic;
      font-size: 15px;
      line-height: 1.65;
    }
    details.thinking .thinking-body strong { color: var(--text-dim); font-style: normal; }

    /* ---- Drive image badge ---- */
    .drive-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-dim);
      background: var(--surface);
      border: 1px solid var(--rule);
      border-radius: var(--r-md);
    }

    /* ---- Prose (markdown) ---- */
    .prose {
      font-family: var(--font-serif);
      font-size: var(--size-body);
      line-height: var(--lh-body);
      color: var(--text);
      word-wrap: break-word;
      overflow-wrap: break-word;
    }
    .prose > *:first-child { margin-top: 0; }
    .prose > *:last-child { margin-bottom: 0; }
    .prose p { margin: 0 0 1em; }
    .prose h1, .prose h2, .prose h3, .prose h4, .prose h5, .prose h6 {
      font-family: var(--font-serif);
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text);
      margin: 1.6em 0 0.6em;
      line-height: var(--lh-heading);
    }
    .prose h1 { font-size: 1.55em; }
    .prose h2 { font-size: 1.3em; }
    .prose h3 { font-size: 1.15em; }
    .prose h4 { font-size: 1em; }
    .prose h5, .prose h6 { font-size: 0.95em; color: var(--text-dim); }
    .prose strong { color: var(--text); font-weight: 600; }
    .prose em { color: inherit; }
    .prose a {
      color: var(--accent);
      text-decoration: underline;
      text-decoration-color: color-mix(in oklab, var(--accent) 40%, transparent);
      text-underline-offset: 3px;
      transition: text-decoration-color 0.15s;
    }
    .prose a:hover { text-decoration-color: var(--accent); }
    .prose ul, .prose ol { margin: 0 0 1em; padding-left: 1.5em; }
    .prose ul { list-style: none; }
    .prose ul > li { position: relative; }
    .prose ul > li::before {
      content: "—";
      position: absolute;
      left: -1.4em;
      color: var(--text-dimmer);
    }
    .prose ol > li { margin-bottom: 0.3em; }
    .prose ol > li::marker { color: var(--text-dimmer); font-family: var(--font-mono); font-size: 0.9em; }
    .prose li { margin-bottom: 0.4em; }
    .prose blockquote {
      margin: 1.2em 0;
      padding: 0 0 0 1.2em;
      border-left: 2px solid var(--rule-strong);
      color: var(--text-dim);
      font-style: italic;
    }
    .prose hr {
      border: none;
      border-top: 1px solid var(--rule);
      margin: 2em 0;
    }
    .prose code {
      font-family: var(--font-mono);
      font-size: 0.88em;
      color: var(--text);
      background: var(--surface);
      padding: 1px 5px;
      border-radius: var(--r-sm);
      border: none;
    }
    .prose pre {
      margin: 1.4em 0;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--rule);
      border-radius: var(--r-lg);
      overflow-x: auto;
      line-height: 1.55;
    }
    .prose pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: 14px;
      color: var(--text);
    }
    .prose table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.4em 0;
      font-family: var(--font-sans);
      font-size: 14px;
    }
    .prose th, .prose td {
      padding: 8px 12px;
      border-bottom: 1px solid var(--rule);
      text-align: left;
    }
    .prose th {
      font-family: var(--font-sans);
      font-weight: 600;
      color: var(--text-dim);
      border-bottom-color: var(--rule-strong);
    }
    .prose img {
      max-width: 100%;
      height: auto;
      border-radius: var(--r-md);
    }

    body.hide-user   .msg[data-role="user"]:not(.msg-thinking)  { display: none !important; }
    body.hide-model  .msg[data-role="model"]:not(.msg-thinking) { display: none !important; }
    body.hide-thinking .msg.msg-thinking { display: none !important; }

    /* ---- Jump button ---- */
    .jump-btn {
      position: fixed;
      right: max(20px, env(safe-area-inset-right));
      bottom: max(20px, calc(env(safe-area-inset-bottom) + 16px));
      z-index: 60;
      padding: 7px 12px;
      font-family: var(--font-sans);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-dim);
      background: var(--bg);
      border: 1px solid var(--rule);
      border-radius: var(--r-md);
      cursor: pointer;
      box-shadow: var(--shadow-1);
      opacity: 0;
      transform: translateY(6px);
      pointer-events: none;
      transition: opacity 0.18s, transform 0.18s, color 0.15s, border-color 0.15s;
    }
    .jump-btn.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }
    .jump-btn:hover { color: var(--accent); border-color: var(--rule-strong); }
    .jump-btn .arrow { display: inline-block; transition: transform 0.25s; }
    .jump-btn.up .arrow { transform: rotate(180deg); }

    /* ---- Toast ---- */
    .toast {
      position: fixed;
      left: 50%;
      bottom: max(28px, calc(env(safe-area-inset-bottom) + 16px));
      transform: translate(-50%, 10px);
      z-index: 80;
      padding: 8px 14px;
      font-family: var(--font-sans);
      font-size: 12px;
      color: var(--text);
      background: var(--surface-2);
      border: 1px solid var(--rule);
      border-radius: var(--r-md);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
    }
    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    /* ---- Message actions ---- */
    .msg-actions {
      position: absolute;
      top: -2px;
      right: 0;
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .msg:hover > .msg-actions,
    .msg.is-editing > .msg-actions { opacity: 1; }
    .msg.msg-thinking:not(:has(details[open])):not(.is-editing) > .msg-actions { display: none; }
    @media (hover: none) {
      .msg-actions { opacity: 0.5; }
    }
    .msg-action {
      font-family: var(--font-sans);
      font-size: 11px;
      letter-spacing: 0.04em;
      color: var(--text-dimmer);
      background: transparent;
      border: none;
      padding: 2px 6px;
      cursor: pointer;
      transition: color 0.15s;
    }
    .msg-action:hover { color: var(--text); }
    .msg-action.danger:hover { color: var(--danger); }

    @keyframes msgFlash {
      0%   { box-shadow: 0 0 0 8px color-mix(in oklab, var(--accent) 18%, transparent); }
      100% { box-shadow: 0 0 0 0 transparent; }
    }
    .msg.flash {
      animation: msgFlash 1.6s ease-out 1;
      border-radius: var(--r-sm);
    }

    /* ---- Edit mode ---- */
    .msg.is-editing {
      box-shadow: 0 0 0 8px var(--surface);
      background: var(--surface);
      border-radius: var(--r-sm);
    }
    .msg-editor {
      display: flex;
      flex-direction: column;
      gap: var(--gap-tight);
    }
    .msg-editor textarea {
      width: 100%;
      min-height: 140px;
      padding: 12px 14px;
      font-family: var(--font-serif);
      font-size: var(--size-body);
      line-height: var(--lh-body);
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--rule);
      border-radius: var(--r-md);
      resize: vertical;
      outline: none;
      transition: border-color 0.15s;
    }
    .msg-editor textarea:focus { border-color: var(--text-dim); }
    .msg-editor-actions {
      display: flex;
      gap: var(--gap-cozy);
      justify-content: flex-end;
    }
    .msg-editor-actions button {
      font-family: var(--font-sans);
      font-size: 12px;
      letter-spacing: 0.04em;
      padding: 4px 8px;
      background: transparent;
      border: none;
      cursor: pointer;
      transition: color 0.15s;
    }
    .msg-editor-actions .save { color: var(--accent); font-weight: 500; }
    .msg-editor-actions .save:hover { color: var(--text); }
    .msg-editor-actions .cancel { color: var(--text-dim); }
    .msg-editor-actions .cancel:hover { color: var(--text); }

    /* ---- Mobile ---- */
    @media (max-width: 640px) {
      :root { --col: 100%; --size-body: 16px; --gap-msg: 32px; }
      .topbar {
        padding-top: max(10px, env(safe-area-inset-top));
        padding-right: 16px;
        padding-bottom: 10px;
        padding-left: 16px;
      }
      .topbar-row {
        grid-template-columns: 1fr auto;
        grid-template-areas:
          "brand   actions"
          "search  search"
          "filters filters";
        gap: 10px;
      }
      .brand { font-size: 17px; }
      .brand small { display: none; }
      .stats { display: none; }
      .actions { gap: 14px; }
      main {
        padding: 28px 16px;
        padding-bottom: max(96px, calc(env(safe-area-inset-bottom) + 80px));
      }
      .empty { margin: 48px auto; }
      .empty h1 { font-size: 30px; }
      .search-wrap { width: 100%; }
      .filters {
        gap: 10px;
        flex-wrap: nowrap;
        overflow-x: auto;
        scrollbar-width: none;
        -webkit-overflow-scrolling: touch;
        padding-bottom: 2px;
      }
      .filters::-webkit-scrollbar { display: none; }
    }
  </style>
</head>
<body>
  <div id="progress" class="progress" hidden>
    <div class="label">Loading…</div>
    <div class="track"><div class="bar"></div></div>
  </div>

  <header class="topbar">
    <div class="topbar-row">
      <div class="brand-wrap">
        <div class="brand">Token Viewer<small>offline</small></div>
        <span id="header-info" class="stats" hidden>
          <strong id="count">0</strong> msgs · <strong id="total-tokens">0</strong> tokens
        </span>
      </div>
      <div id="chips" class="filters" hidden>
        <button class="filter active" data-filter="all" type="button">All</button>
        <span class="sep">·</span>
        <button class="filter" data-filter="user" type="button">You</button>
        <span class="sep">·</span>
        <button class="filter" data-filter="model" type="button">Model</button>
        <span class="sep">·</span>
        <button class="filter" data-filter="thinking" type="button">Thinking</button>
      </div>
      <div class="search-wrap">
        <input id="search" type="search" placeholder="Search messages" autocomplete="off" spellcheck="false" />
      </div>
      <div class="actions">
        <button id="export-btn" class="text-btn" type="button" hidden title="Export edited conversation">Export</button>
        <label class="text-btn">
          Open
          <input id="file-input" type="file" accept=".json,application/json,*" />
        </label>
        <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle theme" title="Toggle theme">
          <svg class="ico-paper" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="4"/>
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
          </svg>
          <svg class="ico-ink" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <main>
    <section id="empty-state" class="empty">
      <h1>Read your AI Studio<br/><em>conversations offline.</em></h1>
      <p>A polished, lag-free viewer for Google AI Studio chat exports. Pre-renders the entire transcript, lets you search instantly, and works in airplane mode once installed.</p>
      <label class="drop-zone">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Open a conversation
        <input type="file" accept=".json,application/json,*" data-secondary-input />
      </label>
      <div class="meta">JSON · drag and drop also works</div>
    </section>

    <section id="conversation" class="conversation"></section>
  </main>

  <button id="jump-btn" class="jump-btn" type="button" aria-label="Jump to bottom">
    <span class="label">End</span> <span class="arrow">↓</span>
  </button>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  <script>
    (() => {
      const $ = (s, root = document) => root.querySelector(s);
      const $$ = (s, root = document) => Array.from(root.querySelectorAll(s));

      const fileInput = $('#file-input');
      const secondaryInput = $('[data-secondary-input]');
      const progressEl = $('#progress');
      const conversation = $('#conversation');
      const searchInput = $('#search');
      const countEl = $('#count');
      const totalTokensEl = $('#total-tokens');
      const headerInfo = $('#header-info');
      const emptyState = $('#empty-state');
      const chipsEl = $('#chips');
      const exportBtn = $('#export-btn');
      const jumpBtn = $('#jump-btn');
      const toastEl = $('#toast');
      const themeToggleBtn = $('#theme-toggle');

      let allChunks = [];
      let originalData = null;
      let currentName = 'conversation.json';
      let currentHash = null;
      let highlightObserver = null;
      let dirty = false;
      let suppressScrollSave = false;

      if (window.marked) {
        marked.setOptions({ gfm: true, breaks: false, mangle: false, headerIds: false });
      }

      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js').catch(err => console.warn('SW failed:', err));
        });
      }

      /* ---------- Theme ---------- */
      function applyHljsTheme(mode) {
        $$('link[data-hljs-theme]').forEach(link => {
          link.disabled = link.dataset.hljsTheme !== mode;
        });
      }
      function resolveTheme() {
        const stored = localStorage.getItem('tv.theme');
        if (stored === 'paper' || stored === 'ink') return stored;
        return matchMedia('(prefers-color-scheme: dark)').matches ? 'ink' : 'paper';
      }
      function themeInit() {
        const mode = resolveTheme();
        document.documentElement.dataset.theme = mode;
        applyHljsTheme(mode);
      }
      function themeCycle() {
        const stored = localStorage.getItem('tv.theme') || 'auto';
        const next = stored === 'auto' ? 'paper'
                  : stored === 'paper' ? 'ink'
                  : 'auto';
        if (next === 'auto') localStorage.removeItem('tv.theme');
        else localStorage.setItem('tv.theme', next);
        const mode = resolveTheme();
        document.documentElement.dataset.theme = mode;
        applyHljsTheme(mode);
        showToast('Theme · ' + next);
      }
      themeToggleBtn.addEventListener('click', themeCycle);
      matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
        const stored = localStorage.getItem('tv.theme');
        if (!stored) themeInit();
      });
      themeInit();

      /* ---------- IndexedDB ---------- */
      const DB_NAME = 'tokens-viewer';
      const DB_VERSION = 1;
      let dbPromise = null;
      function openDB() {
        if (dbPromise) return dbPromise;
        dbPromise = new Promise((resolve, reject) => {
          if (!('indexedDB' in window)) return reject(new Error('No IndexedDB'));
          const req = indexedDB.open(DB_NAME, DB_VERSION);
          req.onupgradeneeded = () => {
            const db = req.result;
            if (!db.objectStoreNames.contains('last')) db.createObjectStore('last', { keyPath: 'id' });
            if (!db.objectStoreNames.contains('scroll')) db.createObjectStore('scroll', { keyPath: 'key' });
            if (!db.objectStoreNames.contains('edits')) db.createObjectStore('edits', { keyPath: 'key' });
          };
          req.onsuccess = () => resolve(req.result);
          req.onerror = () => reject(req.error);
        });
        return dbPromise;
      }
      async function dbGet(store, key) {
        try {
          const db = await openDB();
          return await new Promise((resolve, reject) => {
            const tx = db.transaction(store, 'readonly');
            const req = tx.objectStore(store).get(key);
            req.onsuccess = () => resolve(req.result);
            req.onerror = () => reject(req.error);
          });
        } catch (_) { return null; }
      }
      async function dbPut(store, value) {
        try {
          const db = await openDB();
          await new Promise((resolve, reject) => {
            const tx = db.transaction(store, 'readwrite');
            tx.objectStore(store).put(value);
            tx.oncomplete = () => resolve();
            tx.onerror = () => reject(tx.error);
          });
        } catch (_) { /* ignore */ }
      }

      /* ---------- File hash (FNV-1a) ---------- */
      function fnv1a(str) {
        let h = 0x811c9dc5;
        for (let i = 0; i < str.length; i++) {
          h ^= str.charCodeAt(i);
          h = (h + ((h << 1) + (h << 4) + (h << 7) + (h << 8) + (h << 24))) >>> 0;
        }
        return h.toString(16).padStart(8, '0');
      }
      function fileHash(name, text) {
        const probe = text.length > 4096 ? text.slice(0, 4096) : text;
        return fnv1a(name + ':' + text.length + ':' + probe);
      }

      /* ---------- File loading ---------- */
      fileInput.addEventListener('change', (e) => {
        const f = e.target.files[0];
        if (f) loadFromFile(f);
      });
      secondaryInput?.addEventListener('change', (e) => {
        const f = e.target.files[0];
        if (f) loadFromFile(f);
      });

      async function loadFromFile(file) {
        try {
          showProgress(0.02, 'Reading file…');
          await raf();
          const text = await file.text();
          await loadFromText(text, file.name || 'conversation.json', { persist: true });
        } catch (err) {
          hideProgress();
          console.error(err);
          alert('Could not load file:\n' + err.message);
        }
      }

      async function loadFromText(text, name, { persist = true } = {}) {
        if (highlightObserver) { highlightObserver.disconnect(); highlightObserver = null; }
        try {
          showProgress(0.12, 'Parsing JSON…');
          await raf();
          const data = JSON.parse(text);
          const rawChunks = data?.chunkedPrompt?.chunks;
          if (!Array.isArray(rawChunks)) {
            throw new Error('Not a Google AI Studio export — expected chunkedPrompt.chunks array.');
          }

          showProgress(0.18, 'Normalizing…');
          await raf();
          const normalized = rawChunks.map((c, i) => normalize(c, i));

          const hash = fileHash(name, text);
          const savedEdits = await dbGet('edits', hash);
          if (savedEdits && savedEdits.edits) {
            for (const c of normalized) {
              const e = savedEdits.edits[c.idx];
              if (!e) continue;
              if (e.deleted) c.deleted = true;
              if (typeof e.text === 'string') {
                c.text = e.text;
                c.normText = c.text.toLowerCase();
              }
            }
          }

          await preparseMarkdown(normalized);

          showProgress(0.97, 'Mounting…');
          await raf();
          allChunks = normalized;
          originalData = data;
          currentName = name;
          currentHash = hash;
          dirty = !!(savedEdits && savedEdits.edits && Object.keys(savedEdits.edits).length);

          mountConversation(allChunks);
          updateHeader();
          searchInput.value = '';
          applyFiltersFromStorage();
          updateDirtyUI();
          hideProgress();

          if (persist) {
            dbPut('last', { id: 'current', name, text, savedAt: Date.now() });
          }

          const savedScroll = await dbGet('scroll', hash);
          requestAnimationFrame(() => requestAnimationFrame(() => {
            restoreInitialScroll(savedScroll && savedScroll.scrollY);
          }));
        } catch (err) {
          hideProgress();
          console.error(err);
          alert('Could not load:\n' + err.message);
        }
      }

      function normalize(c, idx) {
        const role = c.role || 'user';
        let kind, text = '';
        if (c.driveImage) {
          kind = 'drive-image';
        } else if (c.isThought) {
          kind = 'thinking';
          text = (c.parts || []).map(p => p.text || '').join('').trim();
          if (!text) text = (c.text || '').trim();
        } else {
          kind = 'message';
          text = (c.text || (c.parts || []).map(p => p.text || '').join('')).trim();
        }
        return {
          idx,
          role,
          kind,
          text,
          originalText: text,
          html: '',
          normText: text.toLowerCase(),
          tokens: c.tokenCount || 0,
          createTime: c.createTime || null,
          driveImageId: c.driveImage?.id || null,
          finishReason: c.finishReason || null,
          deleted: false,
        };
      }

      async function preparseMarkdown(chunks) {
        const total = chunks.length;
        const batchSize = 30;
        for (let i = 0; i < total; i += batchSize) {
          const end = Math.min(i + batchSize, total);
          for (let j = i; j < end; j++) renderChunkHtml(chunks[j]);
          const ratio = 0.2 + 0.75 * (end / total);
          showProgress(ratio, `Rendering markdown · ${end}/${total}`);
          await raf();
        }
      }

      function renderChunkHtml(c) {
        if (c.kind !== 'message' && c.kind !== 'thinking') return;
        try {
          c.html = DOMPurify.sanitize(marked.parse(c.text || ''));
        } catch (_) {
          c.html = DOMPurify.sanitize(`<p>${escapeHtml(c.text || '')}</p>`);
        }
      }

      function mountConversation(chunks) {
        conversation.innerHTML = '';
        const frag = document.createDocumentFragment();
        for (const c of chunks) {
          if (c.deleted) continue;
          frag.appendChild(renderChunk(c));
        }
        conversation.appendChild(frag);
        emptyState.hidden = true;
        chipsEl.hidden = false;
        exportBtn.hidden = false;
        setupSyntaxHighlighting();
      }

      function renderChunk(c) {
        const art = document.createElement('article');
        art.className = `msg msg-${c.kind}`;
        art.dataset.idx = c.idx;
        art.dataset.role = c.role === 'user' ? 'user' : 'model';
        art.id = `msg-${c.idx}`;

        if (c.kind === 'drive-image') {
          const span = document.createElement('span');
          span.className = 'drive-badge';
          span.innerHTML = `<span aria-hidden="true">📎</span> Drive image · <span style="font-family:var(--font-mono);">${escapeHtml(c.driveImageId || '')}</span>`;
          art.appendChild(span);
          appendActions(art, c);
          return art;
        }

        if (c.kind === 'thinking') {
          const det = document.createElement('details');
          det.className = 'thinking';
          const sum = document.createElement('summary');
          sum.innerHTML = `
            <span class="chev">▸</span>
            <span class="label">Thoughts</span>
            ${c.tokens ? `<span class="tok">${c.tokens.toLocaleString()} tok</span>` : ''}
          `;
          det.appendChild(sum);
          const body = document.createElement('div');
          body.className = 'msg-body thinking-body prose';
          body.innerHTML = c.html;
          det.appendChild(body);
          art.appendChild(det);
          appendActions(art, c);
          return art;
        }

        const meta = document.createElement('header');
        meta.className = 'msg-meta';
        const roleLabel = c.role === 'user' ? 'You' : 'Model';
        const timeContent = c.createTime ? formatTime(c.createTime) : '#' + c.idx;
        const timeAttr = c.createTime ? ` datetime="${escapeHtml(c.createTime)}"` : '';
        meta.innerHTML = `
          <span class="role">${roleLabel}</span>
          <span class="sep">·</span>
          <time${timeAttr} data-idx="${c.idx}" title="Copy link to this message">${timeContent}</time>
          ${c.tokens ? `<span class="sep">·</span><span class="tokens">${c.tokens.toLocaleString()} tk</span>` : ''}
          <button class="goto" data-goto="${c.idx}" type="button" title="Jump to this message in context" aria-label="Go to message">#</button>
        `;
        art.appendChild(meta);
        const body = document.createElement('div');
        body.className = 'msg-body prose';
        body.innerHTML = c.html;
        art.appendChild(body);
        appendActions(art, c);
        return art;
      }

      function appendActions(art, c) {
        if (c.kind === 'drive-image') return;
        const actions = document.createElement('div');
        actions.className = 'msg-actions';
        const editBtn = document.createElement('button');
        editBtn.className = 'msg-action';
        editBtn.type = 'button';
        editBtn.textContent = 'Edit';
        editBtn.addEventListener('click', (e) => { e.stopPropagation(); enterEditMode(art, c); });
        const delBtn = document.createElement('button');
        delBtn.className = 'msg-action danger';
        delBtn.type = 'button';
        delBtn.textContent = 'Delete';
        delBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          if (confirm('Delete this message? Re-load the original file to restore it.')) {
            deleteMessage(c, art);
          }
        });
        actions.appendChild(editBtn);
        actions.appendChild(delBtn);
        art.appendChild(actions);
      }

      function enterEditMode(art, c) {
        if (art.classList.contains('is-editing')) return;
        art.classList.add('is-editing');
        if (c.kind === 'thinking') {
          const det = art.querySelector('details.thinking');
          if (det) det.open = true;
        }

        const body = art.querySelector('.msg-body');
        const prevHTML = body ? body.innerHTML : '';
        const prevClass = body ? body.className : (c.kind === 'thinking' ? 'msg-body thinking-body prose' : 'msg-body prose');

        const editor = document.createElement('div');
        editor.className = 'msg-editor';
        const ta = document.createElement('textarea');
        ta.value = c.text;
        ta.spellcheck = false;
        const autosize = () => {
          ta.style.height = '';
          ta.style.height = Math.min(800, Math.max(140, ta.scrollHeight + 4)) + 'px';
        };
        ta.addEventListener('input', autosize);

        const actionsRow = document.createElement('div');
        actionsRow.className = 'msg-editor-actions';
        const cancelBtn = document.createElement('button');
        cancelBtn.className = 'cancel';
        cancelBtn.type = 'button';
        cancelBtn.textContent = 'Cancel';
        const saveBtn = document.createElement('button');
        saveBtn.className = 'save';
        saveBtn.type = 'button';
        saveBtn.textContent = 'Save';
        actionsRow.appendChild(cancelBtn);
        actionsRow.appendChild(saveBtn);

        editor.appendChild(ta);
        editor.appendChild(actionsRow);
        if (body) body.replaceWith(editor);

        requestAnimationFrame(() => { autosize(); ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length); });

        const leaveEditing = () => art.classList.remove('is-editing');

        cancelBtn.addEventListener('click', () => {
          const restored = document.createElement('div');
          restored.className = prevClass;
          restored.innerHTML = prevHTML;
          editor.replaceWith(restored);
          leaveEditing();
        });

        saveBtn.addEventListener('click', () => {
          c.text = ta.value;
          c.normText = c.text.toLowerCase();
          renderChunkHtml(c);
          const newBody = document.createElement('div');
          newBody.className = prevClass;
          newBody.innerHTML = c.html;
          editor.replaceWith(newBody);
          newBody.querySelectorAll('pre code:not([data-highlighted])').forEach(el => {
            try { if (window.hljs) { hljs.highlightElement(el); el.dataset.highlighted = '1'; } } catch (_) {}
          });
          leaveEditing();
          markDirty();
          persistEdits();
        });

        ta.addEventListener('keydown', (e) => {
          if (e.key === 'Escape') { e.preventDefault(); cancelBtn.click(); }
          else if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') { e.preventDefault(); saveBtn.click(); }
        });
      }

      function deleteMessage(c, art) {
        c.deleted = true;
        art.remove();
        updateHeader();
        markDirty();
        persistEdits();
      }

      function markDirty() {
        dirty = true;
        updateDirtyUI();
      }
      function updateDirtyUI() {
        exportBtn.classList.toggle('dirty', dirty);
        exportBtn.title = dirty ? 'Export edited conversation (unsaved edits)' : 'Export conversation';
      }

      async function persistEdits() {
        if (!currentHash) return;
        const edits = {};
        for (const c of allChunks) {
          if (c.deleted) edits[c.idx] = { deleted: true };
          else if (c.text !== c.originalText) edits[c.idx] = { text: c.text };
        }
        await dbPut('edits', { key: currentHash, edits, savedAt: Date.now() });
      }

      function setupSyntaxHighlighting() {
        if (!window.hljs) return;
        highlightObserver = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              entry.target.querySelectorAll('pre code:not([data-highlighted])').forEach(el => {
                try { hljs.highlightElement(el); el.dataset.highlighted = '1'; } catch (_) {}
              });
              highlightObserver.unobserve(entry.target);
            }
          });
        }, { rootMargin: '400px 0px' });
        $$('article.msg').forEach(el => highlightObserver.observe(el));
      }

      let searchDebounce = null;
      searchInput.addEventListener('input', () => {
        clearTimeout(searchDebounce);
        searchDebounce = setTimeout(applySearch, 80);
      });

      function applySearch() {
        const q = searchInput.value.trim().toLowerCase();
        const articles = $$('article.msg', conversation);
        let visible = 0;
        for (const el of articles) {
          const idx = +el.dataset.idx;
          const c = allChunks[idx];
          let match = !q;
          if (q && c) {
            match = (c.normText && c.normText.includes(q)) ||
                    (c.driveImageId && c.driveImageId.toLowerCase().includes(q));
          }
          el.classList.toggle('hidden', !match);
          if (match) visible++;
        }
        if (q) {
          countEl.textContent = `${visible}/${articles.length}`;
        } else {
          countEl.textContent = `${articles.length}`;
        }
      }

      function updateHeader() {
        headerInfo.hidden = false;
        const live = allChunks.filter(c => !c.deleted);
        countEl.textContent = live.length.toLocaleString();
        totalTokensEl.textContent = live.reduce((s, c) => s + (c.tokens || 0), 0).toLocaleString();
      }

      /* ---------- Filter chips ---------- */
      const FILTERS_KEY = 'tv.filters';
      function applyFiltersFromStorage() {
        let saved = {};
        try { saved = JSON.parse(localStorage.getItem(FILTERS_KEY) || '{}'); } catch (_) {}
        document.body.classList.toggle('hide-user', !!saved.hideUser);
        document.body.classList.toggle('hide-model', !!saved.hideModel);
        document.body.classList.toggle('hide-thinking', !!saved.hideThinking);
        refreshChipStates();
      }
      function refreshChipStates() {
        const b = document.body.classList;
        const noFilter = !b.contains('hide-user') && !b.contains('hide-model') && !b.contains('hide-thinking');
        chipsEl.querySelector('[data-filter="all"]').classList.toggle('active', noFilter);
        chipsEl.querySelector('[data-filter="user"]').classList.toggle('active', !b.contains('hide-user'));
        chipsEl.querySelector('[data-filter="model"]').classList.toggle('active', !b.contains('hide-model'));
        chipsEl.querySelector('[data-filter="thinking"]').classList.toggle('active', !b.contains('hide-thinking'));
      }
      function persistFilters() {
        const b = document.body.classList;
        try {
          localStorage.setItem(FILTERS_KEY, JSON.stringify({
            hideUser: b.contains('hide-user'),
            hideModel: b.contains('hide-model'),
            hideThinking: b.contains('hide-thinking'),
          }));
        } catch (_) {}
      }
      chipsEl.addEventListener('click', (e) => {
        const btn = e.target.closest('.filter');
        if (!btn) return;
        const f = btn.dataset.filter;
        const b = document.body.classList;
        if (f === 'all') {
          b.remove('hide-user', 'hide-model', 'hide-thinking');
        } else if (f === 'user') {
          b.toggle('hide-user');
        } else if (f === 'model') {
          b.toggle('hide-model');
        } else if (f === 'thinking') {
          b.toggle('hide-thinking');
        }
        refreshChipStates();
        persistFilters();
      });
      applyFiltersFromStorage();

      /* ---------- Drag/drop ---------- */
      let dragCounter = 0;
      window.addEventListener('dragenter', (e) => {
        e.preventDefault();
        dragCounter++;
        document.body.classList.add('dragging');
      });
      window.addEventListener('dragleave', (e) => {
        e.preventDefault();
        dragCounter--;
        if (dragCounter <= 0) {
          dragCounter = 0;
          document.body.classList.remove('dragging');
        }
      });
      window.addEventListener('dragover', (e) => { e.preventDefault(); });
      window.addEventListener('drop', (e) => {
        e.preventDefault();
        dragCounter = 0;
        document.body.classList.remove('dragging');
        const f = e.dataTransfer?.files?.[0];
        if (f) loadFromFile(f);
      });

      /* ---------- Jump button + scroll memory ---------- */
      function updateJumpButton() {
        const doc = document.documentElement;
        const scrollTop = window.scrollY || doc.scrollTop;
        const max = doc.scrollHeight - window.innerHeight;
        jumpBtn.classList.toggle('visible', max > 600);
        const past = scrollTop > max / 2;
        jumpBtn.classList.toggle('up', past);
        jumpBtn.querySelector('.label').textContent = past ? 'Top' : 'End';
        jumpBtn.setAttribute('aria-label', past ? 'Jump to top' : 'Jump to bottom');
      }
      jumpBtn.addEventListener('click', () => {
        const doc = document.documentElement;
        const scrollTop = window.scrollY || doc.scrollTop;
        const max = doc.scrollHeight - window.innerHeight;
        const past = scrollTop > max / 2;
        window.scrollTo({ top: past ? 0 : doc.scrollHeight, behavior: 'smooth' });
      });

      let scrollSaveTimer = null;
      window.addEventListener('scroll', () => {
        updateJumpButton();
        if (suppressScrollSave || !currentHash) return;
        clearTimeout(scrollSaveTimer);
        scrollSaveTimer = setTimeout(() => {
          dbPut('scroll', { key: currentHash, scrollY: window.scrollY, savedAt: Date.now() });
        }, 250);
      }, { passive: true });

      function restoreInitialScroll(savedScrollY) {
        suppressScrollSave = true;
        const h = location.hash;
        let target = null;
        if (h && /^#msg-\d+$/.test(h)) {
          target = document.getElementById(h.slice(1));
        }
        if (target) {
          target.scrollIntoView({ block: 'start' });
        } else if (typeof savedScrollY === 'number' && savedScrollY > 0) {
          window.scrollTo(0, savedScrollY);
        } else {
          window.scrollTo(0, document.documentElement.scrollHeight);
        }
        setTimeout(() => { suppressScrollSave = false; updateJumpButton(); }, 200);
      }

      window.addEventListener('hashchange', () => {
        const h = location.hash;
        if (h && /^#msg-\d+$/.test(h)) {
          const el = document.getElementById(h.slice(1));
          if (el) el.scrollIntoView({ block: 'start', behavior: 'smooth' });
        }
      });

      /* ---------- Hash links on timestamps ---------- */
      conversation.addEventListener('click', (e) => {
        const go = e.target.closest('button.goto[data-goto]');
        if (go) {
          e.stopPropagation();
          gotoMessage(+go.dataset.goto);
          return;
        }
        const t = e.target.closest('time[data-idx]');
        if (!t) return;
        const idx = t.dataset.idx;
        const url = location.origin + location.pathname + '#msg-' + idx;
        try {
          navigator.clipboard.writeText(url);
          showToast('Link copied');
        } catch (_) {
          showToast('Copy failed');
        }
        history.replaceState(null, '', '#msg-' + idx);
      });

      function gotoMessage(idx) {
        const el = document.getElementById('msg-' + idx);
        if (!el) return;
        if (searchInput.value) {
          searchInput.value = '';
          applySearch();
        }
        requestAnimationFrame(() => {
          el.scrollIntoView({ block: 'center', behavior: 'smooth' });
          el.classList.remove('flash');
          void el.offsetWidth;
          el.classList.add('flash');
          setTimeout(() => el.classList.remove('flash'), 1700);
          history.replaceState(null, '', '#msg-' + idx);
        });
      }

      /* ---------- Toast ---------- */
      let toastTimer = null;
      function showToast(msg) {
        toastEl.textContent = msg;
        toastEl.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toastEl.classList.remove('show'), 1600);
      }

      /* ---------- Export ---------- */
      exportBtn.addEventListener('click', () => {
        if (!originalData) return;
        try {
          const exported = structuredClone(originalData);
          const byIdx = new Map(allChunks.map(c => [c.idx, c]));
          exported.chunkedPrompt.chunks = originalData.chunkedPrompt.chunks
            .map((raw, i) => {
              const c = byIdx.get(i);
              if (!c || c.deleted) return null;
              if (c.text === c.originalText) return raw;
              const next = structuredClone(raw);
              if (Array.isArray(next.parts) && next.parts.some(p => 'text' in p)) {
                let placed = false;
                next.parts = next.parts.map(p => {
                  if (placed || !('text' in p)) return p;
                  placed = true;
                  return { ...p, text: c.text };
                });
              } else {
                next.text = c.text;
              }
              return next;
            })
            .filter(Boolean);

          const blob = new Blob([JSON.stringify(exported, null, 2)], { type: 'application/json' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          const base = (currentName || 'conversation.json').replace(/\.json$/i, '');
          a.download = base + '.edited.json';
          document.body.appendChild(a);
          a.click();
          a.remove();
          setTimeout(() => URL.revokeObjectURL(url), 4000);
          dirty = false;
          updateDirtyUI();
          showToast('Exported');
        } catch (err) {
          console.error(err);
          alert('Export failed: ' + err.message);
        }
      });

      /* ---------- Keyboard shortcuts ---------- */
      window.addEventListener('keydown', (e) => {
        if (e.ctrlKey || e.metaKey || e.altKey) return;
        const t = e.target;
        const inField = t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable);
        if (inField) {
          if (e.key === 'Escape' && t === searchInput) {
            searchInput.value = '';
            applySearch();
            searchInput.blur();
          }
          return;
        }
        if (e.key === '/') {
          e.preventDefault();
          searchInput.focus();
          searchInput.select();
        } else if (e.key === 'j') {
          e.preventDefault();
          stepMessage(1);
        } else if (e.key === 'k') {
          e.preventDefault();
          stepMessage(-1);
        } else if (e.key === 'g' && !e.shiftKey) {
          e.preventDefault();
          window.scrollTo({ top: 0, behavior: 'smooth' });
        } else if (e.key === 'G' || (e.key === 'g' && e.shiftKey)) {
          e.preventDefault();
          window.scrollTo({ top: document.documentElement.scrollHeight, behavior: 'smooth' });
        } else if (e.key === 't') {
          e.preventDefault();
          toggleAllThinking();
        }
      });

      function stepMessage(dir) {
        const articles = $$('article.msg', conversation)
          .filter(el => !el.classList.contains('hidden') && window.getComputedStyle(el).display !== 'none');
        if (!articles.length) return;
        const slack = 10;
        if (dir > 0) {
          const next = articles.find(el => el.getBoundingClientRect().top > slack);
          (next || articles[articles.length - 1]).scrollIntoView({ block: 'start', behavior: 'smooth' });
        } else {
          const above = [...articles].reverse().find(el => el.getBoundingClientRect().top < -slack);
          (above || articles[0]).scrollIntoView({ block: 'start', behavior: 'smooth' });
        }
      }

      function toggleAllThinking() {
        const dets = $$('details.thinking', conversation);
        if (!dets.length) return;
        const anyClosed = dets.some(d => !d.open);
        dets.forEach(d => { d.open = anyClosed; });
      }

      /* ---------- Helpers ---------- */
      function showProgress(ratio, label) {
        progressEl.hidden = false;
        progressEl.querySelector('.bar').style.width = (Math.max(0, Math.min(1, ratio)) * 100) + '%';
        progressEl.querySelector('.label').textContent = label;
      }
      function hideProgress() { progressEl.hidden = true; }

      function formatTime(iso) {
        try {
          const d = new Date(iso);
          if (isNaN(d.getTime())) return '';
          return d.toLocaleString(undefined, {
            month: 'short', day: 'numeric',
            hour: '2-digit', minute: '2-digit'
          });
        } catch { return ''; }
      }

      function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, c => ({
          '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
        }[c]));
      }

      function raf() { return new Promise(r => setTimeout(r, 0)); }

      /* ---------- Auto-restore on boot ---------- */
      (async () => {
        const last = await dbGet('last', 'current');
        if (last && last.text) {
          await loadFromText(last.text, last.name || 'conversation.json', { persist: false });
        }
      })();
    })();
  </script>
</body>
</html>
