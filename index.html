<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0e14" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Tokens" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" href="icons/icon-192.png" />
  <title>Token Viewer</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css" />

  <style>
    :root {
      --bg: #0a0e14;
      --surface: #11161e;
      --surface-2: #1a2230;
      --border: #232e3e;
      --border-soft: #1a2230;
      --text: #e8e4dc;
      --text-dim: #a8b3c3;
      --text-dimmer: #6a7790;
      --user: #f4a261;
      --user-bg: rgba(244, 162, 97, 0.06);
      --model: #7fb3d5;
      --model-bg: rgba(127, 179, 213, 0.04);
      --thinking: #5d6a7c;
      --thinking-bg: rgba(93, 106, 124, 0.05);
      --link: #87b8e0;
      --code-bg: #0d1218;
      --selection: rgba(244, 162, 97, 0.3);

      --font-sans: -apple-system, BlinkMacSystemFont, "Inter", system-ui, "Helvetica Neue", sans-serif;
      --font-serif: ui-serif, "Iowan Old Style", "Source Serif Pro", Georgia, "Times New Roman", serif;
      --font-mono: ui-monospace, "JetBrains Mono", "SF Mono", "Cascadia Code", Menlo, monospace;

      --col-width: 72ch;
      --header-h: 64px;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    html {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 16px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -webkit-text-size-adjust: 100%;
      text-rendering: optimizeLegibility;
    }
    body {
      min-height: 100dvh;
      overflow-x: hidden;
    }
    ::selection { background: var(--selection); }

    /* ---- Header ---- */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      background: color-mix(in oklab, var(--bg) 80%, transparent);
      -webkit-backdrop-filter: saturate(140%) blur(14px);
      backdrop-filter: saturate(140%) blur(14px);
      border-bottom: 1px solid var(--border-soft);
      padding: 12px 20px;
      padding-top: max(12px, env(safe-area-inset-top));
    }
    .topbar-row {
      display: flex;
      align-items: center;
      gap: 16px;
      max-width: 1100px;
      margin: 0 auto;
      flex-wrap: wrap;
    }
    .brand {
      display: flex; align-items: center; gap: 10px;
      font-family: var(--font-serif);
      font-size: 19px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text);
      flex-shrink: 0;
    }
    .brand .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--user);
      box-shadow: 0 0 12px var(--user);
    }
    .brand small {
      font-family: var(--font-sans);
      font-weight: 400;
      font-size: 12px;
      color: var(--text-dimmer);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-left: 6px;
    }
    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 0;
      justify-content: flex-end;
    }
    .file-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 7px 13px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-dim);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .file-btn:hover { color: var(--text); border-color: var(--text-dimmer); }
    .file-btn input[type="file"] { display: none; }
    .search-wrap {
      position: relative;
      flex: 1;
      max-width: 320px;
      min-width: 140px;
    }
    .search-wrap input {
      width: 100%;
      padding: 7px 12px 7px 32px;
      font-family: inherit;
      font-size: 13px;
      color: var(--text);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      outline: none;
      transition: border-color 0.15s;
    }
    .search-wrap input:focus { border-color: var(--user); }
    .search-wrap input::placeholder { color: var(--text-dimmer); }
    .search-wrap::before {
      content: "";
      position: absolute;
      left: 11px; top: 50%; transform: translateY(-50%);
      width: 13px; height: 13px;
      background: no-repeat center / contain url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236a7790' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round'><circle cx='11' cy='11' r='7'/><line x1='21' y1='21' x2='16.65' y2='16.65'/></svg>");
      pointer-events: none;
    }
    .stats {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-dimmer);
      letter-spacing: 0.02em;
      white-space: nowrap;
    }
    .stats strong {
      color: var(--text-dim);
      font-weight: 600;
    }

    /* ---- Progress ---- */
    .progress {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 14px 20px;
      background: var(--bg);
      border-bottom: 1px solid var(--border-soft);
    }
    .progress[hidden] { display: none; }
    .progress .label {
      font-size: 12px;
      color: var(--text-dim);
      margin-bottom: 8px;
      font-family: var(--font-mono);
      letter-spacing: 0.02em;
    }
    .progress .track {
      height: 3px;
      background: var(--surface-2);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress .bar {
      height: 100%;
      background: linear-gradient(90deg, var(--user), var(--model));
      width: 0%;
      transition: width 0.2s ease-out;
    }

    /* ---- Main / Empty state ---- */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 20px;
      padding-bottom: max(80px, calc(env(safe-area-inset-bottom) + 60px));
    }
    body.dragging::after {
      content: "Drop conversation file here";
      position: fixed;
      inset: 0;
      z-index: 200;
      background: color-mix(in oklab, var(--user) 12%, var(--bg));
      border: 2px dashed var(--user);
      display: grid;
      place-items: center;
      font-family: var(--font-serif);
      font-size: 28px;
      color: var(--user);
      pointer-events: none;
    }

    .empty {
      max-width: var(--col-width);
      margin: 80px auto;
      text-align: center;
    }
    .empty h1 {
      font-family: var(--font-serif);
      font-size: clamp(28px, 5vw, 42px);
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
      margin: 0 0 16px;
    }
    .empty h1 em {
      color: var(--user);
      font-style: normal;
      font-weight: 400;
    }
    .empty p {
      font-size: 16px;
      color: var(--text-dim);
      max-width: 50ch;
      margin: 0 auto 28px;
      line-height: 1.65;
    }
    .empty .drop-zone {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 22px;
      font-size: 15px;
      font-weight: 500;
      color: var(--user);
      background: var(--user-bg);
      border: 1px solid color-mix(in oklab, var(--user) 30%, transparent);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .empty .drop-zone:hover {
      background: color-mix(in oklab, var(--user) 12%, transparent);
      border-color: var(--user);
    }
    .empty .drop-zone input { display: none; }
    .empty .meta {
      margin-top: 32px;
      font-size: 12px;
      color: var(--text-dimmer);
      font-family: var(--font-mono);
      letter-spacing: 0.02em;
    }

    /* ---- Conversation ---- */
    .conversation {
      display: flex;
      flex-direction: column;
      gap: 28px;
      max-width: var(--col-width);
      margin: 0 auto;
    }
    .msg {
      content-visibility: auto;
      contain-intrinsic-size: auto 420px;
      position: relative;
      padding: 18px 22px 20px 22px;
      border-radius: 12px;
      border: 1px solid var(--border-soft);
      background: var(--surface);
      transition: border-color 0.15s;
    }
    .msg.hidden { display: none; }
    .msg:hover { border-color: var(--border); }

    .msg.is-user {
      border-left: 3px solid var(--user);
      background: linear-gradient(90deg, var(--user-bg), var(--surface) 30%);
    }
    .msg.is-model {
      border-left: 3px solid var(--model);
    }
    .msg.msg-thinking {
      background: var(--thinking-bg);
      border: 1px dashed color-mix(in oklab, var(--thinking) 50%, transparent);
      padding: 12px 18px;
      gap: 0;
    }
    .msg.msg-thinking .msg-body { display: none; }
    .msg.msg-thinking.is-open { padding-bottom: 16px; }
    .msg.msg-thinking.is-open .msg-body { display: block; }
    .msg.msg-thinking.is-open .chev { transform: rotate(90deg); }

    .msg.msg-drive-image {
      background: transparent;
      border: none;
      padding: 0;
      text-align: center;
    }

    .msg-meta {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 12px;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text-dimmer);
    }
    .msg-meta .role {
      font-weight: 600;
      letter-spacing: 0.08em;
    }
    .is-user .msg-meta .role { color: var(--user); }
    .is-model .msg-meta .role { color: var(--model); }
    .msg-meta time { color: var(--text-dimmer); }
    .msg-meta .tok {
      margin-left: auto;
      color: var(--text-dimmer);
    }

    .thinking-toggle {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 0;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--thinking);
      background: none;
      border: none;
      cursor: pointer;
      text-align: left;
    }
    .thinking-toggle:hover { color: var(--text-dim); }
    .thinking-toggle .chev {
      display: inline-block;
      transition: transform 0.15s;
      font-size: 9px;
    }
    .thinking-toggle .label { flex: 1; }
    .thinking-toggle .tok {
      font-weight: 400;
      letter-spacing: 0.04em;
      color: var(--text-dimmer);
    }
    .thinking-body {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px dashed color-mix(in oklab, var(--thinking) 40%, transparent);
      color: var(--text-dim);
      font-style: italic;
    }
    .thinking-body strong { color: var(--text-dim); font-style: normal; }

    .drive-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-dimmer);
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: 20px;
    }

    /* ---- Prose (markdown) ---- */
    .prose {
      font-family: var(--font-serif);
      font-size: 17px;
      line-height: 1.7;
      color: var(--text);
      word-wrap: break-word;
      overflow-wrap: break-word;
    }
    .prose > *:first-child { margin-top: 0; }
    .prose > *:last-child { margin-bottom: 0; }
    .prose p { margin: 0 0 1em; }
    .prose h1, .prose h2, .prose h3, .prose h4, .prose h5, .prose h6 {
      font-family: var(--font-sans);
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text);
      margin: 1.6em 0 0.6em;
      line-height: 1.3;
    }
    .prose h1 { font-size: 1.5em; }
    .prose h2 { font-size: 1.3em; }
    .prose h3 { font-size: 1.15em; color: var(--user); }
    .prose h4 { font-size: 1em; color: var(--model); }
    .prose h5, .prose h6 { font-size: 0.95em; color: var(--text-dim); }
    .prose strong { color: var(--text); font-weight: 600; }
    .prose em { color: inherit; }
    .prose a {
      color: var(--link);
      text-decoration: underline;
      text-decoration-color: color-mix(in oklab, var(--link) 30%, transparent);
      text-underline-offset: 3px;
      transition: text-decoration-color 0.15s;
    }
    .prose a:hover { text-decoration-color: var(--link); }
    .prose ul, .prose ol { margin: 0 0 1em; padding-left: 1.5em; }
    .prose ul { list-style: none; }
    .prose ul > li { position: relative; }
    .prose ul > li::before {
      content: "—";
      position: absolute;
      left: -1.4em;
      color: var(--text-dimmer);
    }
    .prose ol > li { margin-bottom: 0.3em; }
    .prose ol > li::marker { color: var(--text-dimmer); font-family: var(--font-mono); font-size: 0.9em; }
    .prose li { margin-bottom: 0.4em; }
    .prose blockquote {
      margin: 1.2em 0;
      padding: 0 0 0 1.2em;
      border-left: 2px solid var(--model);
      color: var(--text-dim);
      font-style: italic;
    }
    .prose hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2em 0;
    }
    .prose code {
      font-family: var(--font-mono);
      font-size: 0.9em;
      color: var(--user);
      background: var(--code-bg);
      padding: 1px 6px;
      border-radius: 4px;
      border: 1px solid var(--border-soft);
    }
    .prose pre {
      margin: 1.2em 0;
      padding: 14px 16px;
      background: var(--code-bg);
      border: 1px solid var(--border-soft);
      border-radius: 8px;
      overflow-x: auto;
      line-height: 1.5;
    }
    .prose pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: 13px;
      color: var(--text);
    }
    .prose table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.2em 0;
      font-family: var(--font-sans);
      font-size: 14px;
    }
    .prose th, .prose td {
      padding: 8px 12px;
      border: 1px solid var(--border);
      text-align: left;
    }
    .prose th {
      background: var(--surface-2);
      font-weight: 600;
      color: var(--text-dim);
    }
    .prose img {
      max-width: 100%;
      height: auto;
      border-radius: 6px;
    }

    /* ---- Filter chips ---- */
    .chips {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .chip {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text-dimmer);
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 5px 11px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .chip:hover { color: var(--text-dim); border-color: var(--text-dimmer); }
    .chip.active {
      color: var(--bg);
      background: var(--text-dim);
      border-color: var(--text-dim);
    }
    .chip[data-filter="user"].active { background: var(--user); border-color: var(--user); }
    .chip[data-filter="model"].active { background: var(--model); border-color: var(--model); }
    .chip[data-filter="thinking"].active { background: var(--thinking); border-color: var(--thinking); color: var(--text); }

    body.hide-user   .msg.is-user:not(.msg-thinking) { display: none !important; }
    body.hide-model  .msg.is-model:not(.msg-thinking) { display: none !important; }
    body.hide-thinking .msg.msg-thinking { display: none !important; }

    /* ---- Floating jump button ---- */
    .jump-btn {
      position: fixed;
      right: max(16px, env(safe-area-inset-right));
      bottom: max(16px, calc(env(safe-area-inset-bottom) + 12px));
      z-index: 60;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: color-mix(in oklab, var(--surface) 90%, transparent);
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      color: var(--text-dim);
      cursor: pointer;
      display: grid;
      place-items: center;
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
      transition: opacity 0.18s, transform 0.18s, color 0.15s, border-color 0.15s;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
    }
    .jump-btn.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }
    .jump-btn:hover { color: var(--user); border-color: var(--user); }
    .jump-btn svg {
      width: 18px;
      height: 18px;
      transition: transform 0.25s;
    }
    .jump-btn.up svg { transform: rotate(180deg); }

    /* ---- Toast ---- */
    .toast {
      position: fixed;
      left: 50%;
      bottom: max(28px, calc(env(safe-area-inset-bottom) + 16px));
      transform: translate(-50%, 12px);
      z-index: 80;
      padding: 9px 16px;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text);
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
    }
    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    /* ---- Message actions ---- */
    .msg-actions {
      position: absolute;
      top: 8px;
      right: 8px;
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .msg:hover > .msg-actions,
    .msg.is-editing > .msg-actions { opacity: 1; }
    .msg.msg-thinking:not(.is-open):not(.is-editing) > .msg-actions { display: none; }
    .msg-action {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-dimmer);
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 8px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .msg-action:hover { color: var(--text); border-color: var(--text-dimmer); }
    .msg-action.danger:hover { color: #f47272; border-color: #f47272; }

    .msg-meta time {
      cursor: pointer;
      transition: color 0.15s;
    }
    .msg-meta time:hover { color: var(--text-dim); }
    .msg-meta .goto {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-dimmer);
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 2px 9px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .msg-meta .goto:hover { color: var(--user); border-color: var(--user); }

    @keyframes msgFlash {
      0%   { box-shadow: 0 0 0 2px var(--user), 0 0 24px color-mix(in oklab, var(--user) 60%, transparent); }
      100% { box-shadow: 0 0 0 0 transparent, 0 0 0 transparent; }
    }
    .msg.flash { animation: msgFlash 1.6s ease-out 1; }

    /* ---- Edit mode ---- */
    .msg.is-editing {
      border-color: var(--user) !important;
      box-shadow: 0 0 0 1px var(--user);
    }
    .msg-editor {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .msg-editor textarea {
      width: 100%;
      min-height: 140px;
      padding: 12px 14px;
      font-family: var(--font-mono);
      font-size: 13px;
      line-height: 1.55;
      color: var(--text);
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      resize: vertical;
      outline: none;
      transition: border-color 0.15s;
    }
    .msg-editor textarea:focus { border-color: var(--user); }
    .msg-editor-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }
    .msg-editor-actions button {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .msg-editor-actions .save {
      color: var(--bg);
      background: var(--user);
      border: 1px solid var(--user);
    }
    .msg-editor-actions .save:hover { filter: brightness(1.1); }
    .msg-editor-actions .cancel {
      color: var(--text-dim);
      background: transparent;
      border: 1px solid var(--border);
    }
    .msg-editor-actions .cancel:hover { color: var(--text); border-color: var(--text-dimmer); }

    /* ---- Dirty indicator ---- */
    .file-btn.dirty::after {
      content: "";
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--user);
      margin-left: 4px;
      box-shadow: 0 0 6px var(--user);
    }

    /* Mobile tweaks */
    @media (max-width: 640px) {
      :root { --col-width: 100%; }
      .topbar {
        padding-top: max(10px, env(safe-area-inset-top));
        padding-right: 14px;
        padding-bottom: 10px;
        padding-left: 14px;
      }
      .topbar-row { gap: 10px; }
      .brand { font-size: 17px; }
      .brand small { display: none; }
      .stats { display: none; }
      main {
        padding: 20px 14px;
        padding-bottom: max(80px, calc(env(safe-area-inset-bottom) + 60px));
      }
      .msg { padding: 16px 18px; }
      .prose { font-size: 16px; line-height: 1.65; }
      .conversation { gap: 20px; }
      .msg-actions { opacity: 1 !important; }
    }
  </style>
</head>
<body>
  <div id="progress" class="progress" hidden>
    <div class="label">Loading…</div>
    <div class="track"><div class="bar"></div></div>
  </div>

  <header class="topbar">
    <div class="topbar-row">
      <div class="brand"><span class="dot"></span>Token Viewer<small>offline</small></div>
      <div class="toolbar">
        <div id="header-info" hidden>
          <span class="stats"><strong id="count">0</strong> msgs · <strong id="total-tokens">0</strong> tokens</span>
        </div>
        <div id="chips" class="chips" hidden>
          <button class="chip active" data-filter="all" type="button">All</button>
          <button class="chip" data-filter="user" type="button">You</button>
          <button class="chip" data-filter="model" type="button">Model</button>
          <button class="chip" data-filter="thinking" type="button">Thinking</button>
        </div>
        <div class="search-wrap">
          <input id="search" type="search" placeholder="Search…" autocomplete="off" spellcheck="false" />
        </div>
        <button id="export-btn" class="file-btn" type="button" hidden title="Export edited conversation">Export</button>
        <label class="file-btn">
          Open
          <input id="file-input" type="file" accept=".json,application/json,*" />
        </label>
      </div>
    </div>
  </header>

  <main>
    <section id="empty-state" class="empty">
      <h1>Read your AI Studio<br/><em>conversations offline.</em></h1>
      <p>A polished, lag-free viewer for Google AI Studio chat exports. Pre-renders the entire transcript, lets you search instantly, and works in airplane mode once installed.</p>
      <label class="drop-zone">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Open a conversation
        <input type="file" accept=".json,application/json,*" data-secondary-input />
      </label>
      <div class="meta">JSON · drag and drop also works</div>
    </section>

    <section id="conversation" class="conversation"></section>
  </main>

  <button id="jump-btn" class="jump-btn" type="button" aria-label="Jump to bottom">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="6 9 12 15 18 9"></polyline>
    </svg>
  </button>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  <script>
    (() => {
      const $ = (s, root = document) => root.querySelector(s);
      const $$ = (s, root = document) => Array.from(root.querySelectorAll(s));

      const fileInput = $('#file-input');
      const secondaryInput = $('[data-secondary-input]');
      const progressEl = $('#progress');
      const conversation = $('#conversation');
      const searchInput = $('#search');
      const countEl = $('#count');
      const totalTokensEl = $('#total-tokens');
      const headerInfo = $('#header-info');
      const emptyState = $('#empty-state');
      const chipsEl = $('#chips');
      const exportBtn = $('#export-btn');
      const jumpBtn = $('#jump-btn');
      const toastEl = $('#toast');

      let allChunks = [];
      let originalData = null;
      let currentName = 'conversation.json';
      let currentHash = null;
      let highlightObserver = null;
      let dirty = false;
      let suppressScrollSave = false;

      if (window.marked) {
        marked.setOptions({ gfm: true, breaks: false, mangle: false, headerIds: false });
      }

      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js').catch(err => console.warn('SW failed:', err));
        });
      }

      /* ---------- IndexedDB ---------- */
      const DB_NAME = 'tokens-viewer';
      const DB_VERSION = 1;
      let dbPromise = null;
      function openDB() {
        if (dbPromise) return dbPromise;
        dbPromise = new Promise((resolve, reject) => {
          if (!('indexedDB' in window)) return reject(new Error('No IndexedDB'));
          const req = indexedDB.open(DB_NAME, DB_VERSION);
          req.onupgradeneeded = () => {
            const db = req.result;
            if (!db.objectStoreNames.contains('last')) db.createObjectStore('last', { keyPath: 'id' });
            if (!db.objectStoreNames.contains('scroll')) db.createObjectStore('scroll', { keyPath: 'key' });
            if (!db.objectStoreNames.contains('edits')) db.createObjectStore('edits', { keyPath: 'key' });
          };
          req.onsuccess = () => resolve(req.result);
          req.onerror = () => reject(req.error);
        });
        return dbPromise;
      }
      async function dbGet(store, key) {
        try {
          const db = await openDB();
          return await new Promise((resolve, reject) => {
            const tx = db.transaction(store, 'readonly');
            const req = tx.objectStore(store).get(key);
            req.onsuccess = () => resolve(req.result);
            req.onerror = () => reject(req.error);
          });
        } catch (_) { return null; }
      }
      async function dbPut(store, value) {
        try {
          const db = await openDB();
          await new Promise((resolve, reject) => {
            const tx = db.transaction(store, 'readwrite');
            tx.objectStore(store).put(value);
            tx.oncomplete = () => resolve();
            tx.onerror = () => reject(tx.error);
          });
        } catch (_) { /* ignore */ }
      }

      /* ---------- File hash (FNV-1a) ---------- */
      function fnv1a(str) {
        let h = 0x811c9dc5;
        for (let i = 0; i < str.length; i++) {
          h ^= str.charCodeAt(i);
          h = (h + ((h << 1) + (h << 4) + (h << 7) + (h << 8) + (h << 24))) >>> 0;
        }
        return h.toString(16).padStart(8, '0');
      }
      function fileHash(name, text) {
        const probe = text.length > 4096 ? text.slice(0, 4096) : text;
        return fnv1a(name + ':' + text.length + ':' + probe);
      }

      /* ---------- File loading ---------- */
      fileInput.addEventListener('change', (e) => {
        const f = e.target.files[0];
        if (f) loadFromFile(f);
      });
      secondaryInput?.addEventListener('change', (e) => {
        const f = e.target.files[0];
        if (f) loadFromFile(f);
      });

      async function loadFromFile(file) {
        try {
          showProgress(0.02, 'Reading file…');
          await raf();
          const text = await file.text();
          await loadFromText(text, file.name || 'conversation.json', { persist: true });
        } catch (err) {
          hideProgress();
          console.error(err);
          alert('Could not load file:\n' + err.message);
        }
      }

      async function loadFromText(text, name, { persist = true } = {}) {
        if (highlightObserver) { highlightObserver.disconnect(); highlightObserver = null; }
        try {
          showProgress(0.12, 'Parsing JSON…');
          await raf();
          const data = JSON.parse(text);
          const rawChunks = data?.chunkedPrompt?.chunks;
          if (!Array.isArray(rawChunks)) {
            throw new Error('Not a Google AI Studio export — expected chunkedPrompt.chunks array.');
          }

          showProgress(0.18, 'Normalizing…');
          await raf();
          const normalized = rawChunks.map((c, i) => normalize(c, i));

          const hash = fileHash(name, text);
          const savedEdits = await dbGet('edits', hash);
          if (savedEdits && savedEdits.edits) {
            for (const c of normalized) {
              const e = savedEdits.edits[c.idx];
              if (!e) continue;
              if (e.deleted) c.deleted = true;
              if (typeof e.text === 'string') {
                c.text = e.text;
                c.normText = c.text.toLowerCase();
              }
            }
          }

          await preparseMarkdown(normalized);

          showProgress(0.97, 'Mounting…');
          await raf();
          allChunks = normalized;
          originalData = data;
          currentName = name;
          currentHash = hash;
          dirty = !!(savedEdits && savedEdits.edits && Object.keys(savedEdits.edits).length);

          mountConversation(allChunks);
          updateHeader();
          searchInput.value = '';
          applyFiltersFromStorage();
          updateDirtyUI();
          hideProgress();

          if (persist) {
            dbPut('last', { id: 'current', name, text, savedAt: Date.now() });
          }

          const savedScroll = await dbGet('scroll', hash);
          requestAnimationFrame(() => requestAnimationFrame(() => {
            restoreInitialScroll(savedScroll && savedScroll.scrollY);
          }));
        } catch (err) {
          hideProgress();
          console.error(err);
          alert('Could not load:\n' + err.message);
        }
      }

      function normalize(c, idx) {
        const role = c.role || 'user';
        let kind, text = '';
        if (c.driveImage) {
          kind = 'drive-image';
        } else if (c.isThought) {
          kind = 'thinking';
          text = (c.parts || []).map(p => p.text || '').join('').trim();
          if (!text) text = (c.text || '').trim();
        } else {
          kind = 'message';
          text = (c.text || (c.parts || []).map(p => p.text || '').join('')).trim();
        }
        return {
          idx,
          role,
          kind,
          text,
          originalText: text,
          html: '',
          normText: text.toLowerCase(),
          tokens: c.tokenCount || 0,
          createTime: c.createTime || null,
          driveImageId: c.driveImage?.id || null,
          finishReason: c.finishReason || null,
          deleted: false,
        };
      }

      async function preparseMarkdown(chunks) {
        const total = chunks.length;
        const batchSize = 30;
        for (let i = 0; i < total; i += batchSize) {
          const end = Math.min(i + batchSize, total);
          for (let j = i; j < end; j++) renderChunkHtml(chunks[j]);
          const ratio = 0.2 + 0.75 * (end / total);
          showProgress(ratio, `Rendering markdown · ${end}/${total}`);
          await raf();
        }
      }

      function renderChunkHtml(c) {
        if (c.kind !== 'message' && c.kind !== 'thinking') return;
        try {
          c.html = DOMPurify.sanitize(marked.parse(c.text || ''));
        } catch (_) {
          c.html = DOMPurify.sanitize(`<p>${escapeHtml(c.text || '')}</p>`);
        }
      }

      function mountConversation(chunks) {
        conversation.innerHTML = '';
        const frag = document.createDocumentFragment();
        for (const c of chunks) {
          if (c.deleted) continue;
          frag.appendChild(renderChunk(c));
        }
        conversation.appendChild(frag);
        emptyState.hidden = true;
        chipsEl.hidden = false;
        exportBtn.hidden = false;
        setupSyntaxHighlighting();
      }

      function renderChunk(c) {
        const art = document.createElement('article');
        art.className = `msg msg-${c.kind} ${c.role === 'user' ? 'is-user' : 'is-model'}`;
        art.dataset.idx = c.idx;
        art.id = `msg-${c.idx}`;

        if (c.kind === 'drive-image') {
          const span = document.createElement('span');
          span.className = 'drive-badge';
          span.innerHTML = `<span aria-hidden="true">📎</span> Drive image · <span style="font-family:var(--font-mono);">${escapeHtml(c.driveImageId || '')}</span>`;
          art.appendChild(span);
          appendActions(art, c);
          return art;
        }

        if (c.kind === 'thinking') {
          const btn = document.createElement('button');
          btn.className = 'thinking-toggle';
          btn.type = 'button';
          btn.innerHTML = `
            <span class="chev">▶</span>
            <span class="label">Thinking</span>
            <span class="tok">${c.tokens ? c.tokens.toLocaleString() + ' tok' : ''}</span>
          `;
          btn.addEventListener('click', () => art.classList.toggle('is-open'));
          art.appendChild(btn);
          const body = document.createElement('div');
          body.className = 'msg-body thinking-body prose';
          body.innerHTML = c.html;
          art.appendChild(body);
          appendActions(art, c);
          return art;
        }

        const meta = document.createElement('header');
        meta.className = 'msg-meta';
        const roleLabel = c.role === 'user' ? 'You' : 'Model';
        const timeContent = c.createTime ? formatTime(c.createTime) : '#' + c.idx;
        const timeAttr = c.createTime ? ` datetime="${escapeHtml(c.createTime)}"` : '';
        meta.innerHTML = `
          <span class="role">${roleLabel}</span>
          <time${timeAttr} data-idx="${c.idx}" title="Copy link to this message">${timeContent}</time>
          <button class="goto" data-goto="${c.idx}" type="button" title="Jump to this message in context">Go</button>
          ${c.tokens ? `<span class="tok">${c.tokens.toLocaleString()} tok</span>` : ''}
        `;
        art.appendChild(meta);
        const body = document.createElement('div');
        body.className = 'msg-body prose';
        body.innerHTML = c.html;
        art.appendChild(body);
        appendActions(art, c);
        return art;
      }

      function appendActions(art, c) {
        if (c.kind === 'drive-image') return;
        const actions = document.createElement('div');
        actions.className = 'msg-actions';
        const editBtn = document.createElement('button');
        editBtn.className = 'msg-action';
        editBtn.type = 'button';
        editBtn.textContent = 'Edit';
        editBtn.addEventListener('click', (e) => { e.stopPropagation(); enterEditMode(art, c); });
        const delBtn = document.createElement('button');
        delBtn.className = 'msg-action danger';
        delBtn.type = 'button';
        delBtn.textContent = 'Delete';
        delBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          if (confirm('Delete this message? Re-load the original file to restore it.')) {
            deleteMessage(c, art);
          }
        });
        actions.appendChild(editBtn);
        actions.appendChild(delBtn);
        art.appendChild(actions);
      }

      function enterEditMode(art, c) {
        if (art.classList.contains('is-editing')) return;
        art.classList.add('is-editing');
        if (c.kind === 'thinking') art.classList.add('is-open');

        const body = art.querySelector('.msg-body');
        const prevHTML = body ? body.innerHTML : '';
        const prevClass = body ? body.className : (c.kind === 'thinking' ? 'msg-body thinking-body prose' : 'msg-body prose');

        const editor = document.createElement('div');
        editor.className = 'msg-editor';
        const ta = document.createElement('textarea');
        ta.value = c.text;
        ta.spellcheck = false;
        const autosize = () => {
          ta.style.height = '';
          ta.style.height = Math.min(800, Math.max(140, ta.scrollHeight + 4)) + 'px';
        };
        ta.addEventListener('input', autosize);

        const actionsRow = document.createElement('div');
        actionsRow.className = 'msg-editor-actions';
        const cancelBtn = document.createElement('button');
        cancelBtn.className = 'cancel';
        cancelBtn.type = 'button';
        cancelBtn.textContent = 'Cancel';
        const saveBtn = document.createElement('button');
        saveBtn.className = 'save';
        saveBtn.type = 'button';
        saveBtn.textContent = 'Save';
        actionsRow.appendChild(cancelBtn);
        actionsRow.appendChild(saveBtn);

        editor.appendChild(ta);
        editor.appendChild(actionsRow);
        if (body) body.replaceWith(editor);

        requestAnimationFrame(() => { autosize(); ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length); });

        const leaveEditing = () => art.classList.remove('is-editing');

        cancelBtn.addEventListener('click', () => {
          const restored = document.createElement('div');
          restored.className = prevClass;
          restored.innerHTML = prevHTML;
          editor.replaceWith(restored);
          leaveEditing();
        });

        saveBtn.addEventListener('click', () => {
          c.text = ta.value;
          c.normText = c.text.toLowerCase();
          renderChunkHtml(c);
          const newBody = document.createElement('div');
          newBody.className = prevClass;
          newBody.innerHTML = c.html;
          editor.replaceWith(newBody);
          newBody.querySelectorAll('pre code:not([data-highlighted])').forEach(el => {
            try { if (window.hljs) { hljs.highlightElement(el); el.dataset.highlighted = '1'; } } catch (_) {}
          });
          leaveEditing();
          markDirty();
          persistEdits();
        });

        ta.addEventListener('keydown', (e) => {
          if (e.key === 'Escape') { e.preventDefault(); cancelBtn.click(); }
          else if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') { e.preventDefault(); saveBtn.click(); }
        });
      }

      function deleteMessage(c, art) {
        c.deleted = true;
        art.remove();
        updateHeader();
        markDirty();
        persistEdits();
      }

      function markDirty() {
        dirty = true;
        updateDirtyUI();
      }
      function updateDirtyUI() {
        exportBtn.classList.toggle('dirty', dirty);
        exportBtn.title = dirty ? 'Export edited conversation (unsaved edits)' : 'Export conversation';
      }

      async function persistEdits() {
        if (!currentHash) return;
        const edits = {};
        for (const c of allChunks) {
          if (c.deleted) edits[c.idx] = { deleted: true };
          else if (c.text !== c.originalText) edits[c.idx] = { text: c.text };
        }
        await dbPut('edits', { key: currentHash, edits, savedAt: Date.now() });
      }

      function setupSyntaxHighlighting() {
        if (!window.hljs) return;
        highlightObserver = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              entry.target.querySelectorAll('pre code:not([data-highlighted])').forEach(el => {
                try { hljs.highlightElement(el); el.dataset.highlighted = '1'; } catch (_) {}
              });
              highlightObserver.unobserve(entry.target);
            }
          });
        }, { rootMargin: '400px 0px' });
        $$('article.msg').forEach(el => highlightObserver.observe(el));
      }

      let searchDebounce = null;
      searchInput.addEventListener('input', () => {
        clearTimeout(searchDebounce);
        searchDebounce = setTimeout(applySearch, 80);
      });

      function applySearch() {
        const q = searchInput.value.trim().toLowerCase();
        const articles = $$('article.msg', conversation);
        let visible = 0;
        for (const el of articles) {
          const idx = +el.dataset.idx;
          const c = allChunks[idx];
          let match = !q;
          if (q && c) {
            match = (c.normText && c.normText.includes(q)) ||
                    (c.driveImageId && c.driveImageId.toLowerCase().includes(q));
          }
          el.classList.toggle('hidden', !match);
          if (match) visible++;
        }
        if (q) {
          countEl.textContent = `${visible}/${articles.length}`;
        } else {
          countEl.textContent = `${articles.length}`;
        }
      }

      function updateHeader() {
        headerInfo.hidden = false;
        const live = allChunks.filter(c => !c.deleted);
        countEl.textContent = live.length.toLocaleString();
        totalTokensEl.textContent = live.reduce((s, c) => s + (c.tokens || 0), 0).toLocaleString();
      }

      /* ---------- Filter chips ---------- */
      const FILTERS_KEY = 'tv.filters';
      function applyFiltersFromStorage() {
        let saved = {};
        try { saved = JSON.parse(localStorage.getItem(FILTERS_KEY) || '{}'); } catch (_) {}
        document.body.classList.toggle('hide-user', !!saved.hideUser);
        document.body.classList.toggle('hide-model', !!saved.hideModel);
        document.body.classList.toggle('hide-thinking', !!saved.hideThinking);
        refreshChipStates();
      }
      function refreshChipStates() {
        const b = document.body.classList;
        const noFilter = !b.contains('hide-user') && !b.contains('hide-model') && !b.contains('hide-thinking');
        chipsEl.querySelector('[data-filter="all"]').classList.toggle('active', noFilter);
        chipsEl.querySelector('[data-filter="user"]').classList.toggle('active', !b.contains('hide-user'));
        chipsEl.querySelector('[data-filter="model"]').classList.toggle('active', !b.contains('hide-model'));
        chipsEl.querySelector('[data-filter="thinking"]').classList.toggle('active', !b.contains('hide-thinking'));
      }
      function persistFilters() {
        const b = document.body.classList;
        try {
          localStorage.setItem(FILTERS_KEY, JSON.stringify({
            hideUser: b.contains('hide-user'),
            hideModel: b.contains('hide-model'),
            hideThinking: b.contains('hide-thinking'),
          }));
        } catch (_) {}
      }
      chipsEl.addEventListener('click', (e) => {
        const btn = e.target.closest('.chip');
        if (!btn) return;
        const f = btn.dataset.filter;
        const b = document.body.classList;
        if (f === 'all') {
          b.remove('hide-user', 'hide-model', 'hide-thinking');
        } else if (f === 'user') {
          b.toggle('hide-user');
        } else if (f === 'model') {
          b.toggle('hide-model');
        } else if (f === 'thinking') {
          b.toggle('hide-thinking');
        }
        refreshChipStates();
        persistFilters();
      });
      applyFiltersFromStorage();

      /* ---------- Drag/drop ---------- */
      let dragCounter = 0;
      window.addEventListener('dragenter', (e) => {
        e.preventDefault();
        dragCounter++;
        document.body.classList.add('dragging');
      });
      window.addEventListener('dragleave', (e) => {
        e.preventDefault();
        dragCounter--;
        if (dragCounter <= 0) {
          dragCounter = 0;
          document.body.classList.remove('dragging');
        }
      });
      window.addEventListener('dragover', (e) => { e.preventDefault(); });
      window.addEventListener('drop', (e) => {
        e.preventDefault();
        dragCounter = 0;
        document.body.classList.remove('dragging');
        const f = e.dataTransfer?.files?.[0];
        if (f) loadFromFile(f);
      });

      /* ---------- Jump button + scroll memory ---------- */
      function updateJumpButton() {
        const doc = document.documentElement;
        const scrollTop = window.scrollY || doc.scrollTop;
        const max = doc.scrollHeight - window.innerHeight;
        jumpBtn.classList.toggle('visible', max > 600);
        const past = scrollTop > max / 2;
        jumpBtn.classList.toggle('up', past);
        jumpBtn.setAttribute('aria-label', past ? 'Jump to top' : 'Jump to bottom');
      }
      jumpBtn.addEventListener('click', () => {
        const doc = document.documentElement;
        const scrollTop = window.scrollY || doc.scrollTop;
        const max = doc.scrollHeight - window.innerHeight;
        const past = scrollTop > max / 2;
        window.scrollTo({ top: past ? 0 : doc.scrollHeight, behavior: 'smooth' });
      });

      let scrollSaveTimer = null;
      window.addEventListener('scroll', () => {
        updateJumpButton();
        if (suppressScrollSave || !currentHash) return;
        clearTimeout(scrollSaveTimer);
        scrollSaveTimer = setTimeout(() => {
          dbPut('scroll', { key: currentHash, scrollY: window.scrollY, savedAt: Date.now() });
        }, 250);
      }, { passive: true });

      function restoreInitialScroll(savedScrollY) {
        suppressScrollSave = true;
        const h = location.hash;
        let target = null;
        if (h && /^#msg-\d+$/.test(h)) {
          target = document.getElementById(h.slice(1));
        }
        if (target) {
          target.scrollIntoView({ block: 'start' });
        } else if (typeof savedScrollY === 'number' && savedScrollY > 0) {
          window.scrollTo(0, savedScrollY);
        } else {
          window.scrollTo(0, document.documentElement.scrollHeight);
        }
        setTimeout(() => { suppressScrollSave = false; updateJumpButton(); }, 200);
      }

      window.addEventListener('hashchange', () => {
        const h = location.hash;
        if (h && /^#msg-\d+$/.test(h)) {
          const el = document.getElementById(h.slice(1));
          if (el) el.scrollIntoView({ block: 'start', behavior: 'smooth' });
        }
      });

      /* ---------- Hash links on timestamps ---------- */
      conversation.addEventListener('click', (e) => {
        const go = e.target.closest('button.goto[data-goto]');
        if (go) {
          e.stopPropagation();
          gotoMessage(+go.dataset.goto);
          return;
        }
        const t = e.target.closest('time[data-idx]');
        if (!t) return;
        const idx = t.dataset.idx;
        const url = location.origin + location.pathname + '#msg-' + idx;
        try {
          navigator.clipboard.writeText(url);
          showToast('Link copied');
        } catch (_) {
          showToast('Copy failed');
        }
        history.replaceState(null, '', '#msg-' + idx);
      });

      function gotoMessage(idx) {
        const el = document.getElementById('msg-' + idx);
        if (!el) return;
        // Clear search so neighbors become visible
        if (searchInput.value) {
          searchInput.value = '';
          applySearch();
        }
        // Wait a frame for layout to settle after un-filtering, then scroll + flash
        requestAnimationFrame(() => {
          el.scrollIntoView({ block: 'center', behavior: 'smooth' });
          el.classList.remove('flash');
          // force reflow so the animation can restart
          void el.offsetWidth;
          el.classList.add('flash');
          setTimeout(() => el.classList.remove('flash'), 1700);
          history.replaceState(null, '', '#msg-' + idx);
        });
      }

      /* ---------- Toast ---------- */
      let toastTimer = null;
      function showToast(msg) {
        toastEl.textContent = msg;
        toastEl.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toastEl.classList.remove('show'), 1600);
      }

      /* ---------- Export ---------- */
      exportBtn.addEventListener('click', () => {
        if (!originalData) return;
        try {
          const exported = structuredClone(originalData);
          const byIdx = new Map(allChunks.map(c => [c.idx, c]));
          exported.chunkedPrompt.chunks = originalData.chunkedPrompt.chunks
            .map((raw, i) => {
              const c = byIdx.get(i);
              if (!c || c.deleted) return null;
              if (c.text === c.originalText) return raw;
              const next = structuredClone(raw);
              if (Array.isArray(next.parts) && next.parts.some(p => 'text' in p)) {
                let placed = false;
                next.parts = next.parts.map(p => {
                  if (placed || !('text' in p)) return p;
                  placed = true;
                  return { ...p, text: c.text };
                });
              } else {
                next.text = c.text;
              }
              return next;
            })
            .filter(Boolean);

          const blob = new Blob([JSON.stringify(exported, null, 2)], { type: 'application/json' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          const base = (currentName || 'conversation.json').replace(/\.json$/i, '');
          a.download = base + '.edited.json';
          document.body.appendChild(a);
          a.click();
          a.remove();
          setTimeout(() => URL.revokeObjectURL(url), 4000);
          dirty = false;
          updateDirtyUI();
          showToast('Exported');
        } catch (err) {
          console.error(err);
          alert('Export failed: ' + err.message);
        }
      });

      /* ---------- Keyboard shortcuts ---------- */
      window.addEventListener('keydown', (e) => {
        if (e.ctrlKey || e.metaKey || e.altKey) return;
        const t = e.target;
        const inField = t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable);
        if (inField) {
          if (e.key === 'Escape' && t === searchInput) {
            searchInput.value = '';
            applySearch();
            searchInput.blur();
          }
          return;
        }
        if (e.key === '/') {
          e.preventDefault();
          searchInput.focus();
          searchInput.select();
        } else if (e.key === 'j') {
          e.preventDefault();
          stepMessage(1);
        } else if (e.key === 'k') {
          e.preventDefault();
          stepMessage(-1);
        } else if (e.key === 'g' && !e.shiftKey) {
          e.preventDefault();
          window.scrollTo({ top: 0, behavior: 'smooth' });
        } else if (e.key === 'G' || (e.key === 'g' && e.shiftKey)) {
          e.preventDefault();
          window.scrollTo({ top: document.documentElement.scrollHeight, behavior: 'smooth' });
        } else if (e.key === 't') {
          e.preventDefault();
          toggleAllThinking();
        }
      });

      function stepMessage(dir) {
        const articles = $$('article.msg', conversation)
          .filter(el => !el.classList.contains('hidden') && window.getComputedStyle(el).display !== 'none');
        if (!articles.length) return;
        const slack = 10;
        if (dir > 0) {
          const next = articles.find(el => el.getBoundingClientRect().top > slack);
          (next || articles[articles.length - 1]).scrollIntoView({ block: 'start', behavior: 'smooth' });
        } else {
          const above = [...articles].reverse().find(el => el.getBoundingClientRect().top < -slack);
          (above || articles[0]).scrollIntoView({ block: 'start', behavior: 'smooth' });
        }
      }

      function toggleAllThinking() {
        const ts = $$('.msg.msg-thinking', conversation);
        if (!ts.length) return;
        const anyClosed = ts.some(el => !el.classList.contains('is-open'));
        ts.forEach(el => el.classList.toggle('is-open', anyClosed));
      }

      /* ---------- Helpers ---------- */
      function showProgress(ratio, label) {
        progressEl.hidden = false;
        progressEl.querySelector('.bar').style.width = (Math.max(0, Math.min(1, ratio)) * 100) + '%';
        progressEl.querySelector('.label').textContent = label;
      }
      function hideProgress() { progressEl.hidden = true; }

      function formatTime(iso) {
        try {
          const d = new Date(iso);
          if (isNaN(d.getTime())) return '';
          return d.toLocaleString(undefined, {
            month: 'short', day: 'numeric',
            hour: '2-digit', minute: '2-digit'
          });
        } catch { return ''; }
      }

      function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, c => ({
          '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
        }[c]));
      }

      function raf() { return new Promise(r => setTimeout(r, 0)); }

      /* ---------- Auto-restore on boot ---------- */
      (async () => {
        const last = await dbGet('last', 'current');
        if (last && last.text) {
          await loadFromText(last.text, last.name || 'conversation.json', { persist: false });
        }
      })();
    })();
  </script>
</body>
</html>
