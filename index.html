<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0e14" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Tokens" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" href="icons/icon-192.png" />
  <title>Token Viewer</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css" />

  <style>
    :root {
      --bg: #0a0e14;
      --surface: #11161e;
      --surface-2: #1a2230;
      --border: #232e3e;
      --border-soft: #1a2230;
      --text: #e8e4dc;
      --text-dim: #a8b3c3;
      --text-dimmer: #6a7790;
      --user: #f4a261;
      --user-bg: rgba(244, 162, 97, 0.06);
      --model: #7fb3d5;
      --model-bg: rgba(127, 179, 213, 0.04);
      --thinking: #5d6a7c;
      --thinking-bg: rgba(93, 106, 124, 0.05);
      --link: #87b8e0;
      --code-bg: #0d1218;
      --selection: rgba(244, 162, 97, 0.3);

      --font-sans: -apple-system, BlinkMacSystemFont, "Inter", system-ui, "Helvetica Neue", sans-serif;
      --font-serif: ui-serif, "Iowan Old Style", "Source Serif Pro", Georgia, "Times New Roman", serif;
      --font-mono: ui-monospace, "JetBrains Mono", "SF Mono", "Cascadia Code", Menlo, monospace;

      --col-width: 72ch;
      --header-h: 64px;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    html {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 16px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -webkit-text-size-adjust: 100%;
      text-rendering: optimizeLegibility;
    }
    body {
      min-height: 100dvh;
      overflow-x: hidden;
    }
    ::selection { background: var(--selection); }

    /* ---- Header ---- */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      background: color-mix(in oklab, var(--bg) 80%, transparent);
      -webkit-backdrop-filter: saturate(140%) blur(14px);
      backdrop-filter: saturate(140%) blur(14px);
      border-bottom: 1px solid var(--border-soft);
      padding: 12px 20px;
      padding-top: max(12px, env(safe-area-inset-top));
    }
    .topbar-row {
      display: flex;
      align-items: center;
      gap: 16px;
      max-width: 1100px;
      margin: 0 auto;
      flex-wrap: wrap;
    }
    .brand {
      display: flex; align-items: center; gap: 10px;
      font-family: var(--font-serif);
      font-size: 19px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text);
      flex-shrink: 0;
    }
    .brand .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--user);
      box-shadow: 0 0 12px var(--user);
    }
    .brand small {
      font-family: var(--font-sans);
      font-weight: 400;
      font-size: 12px;
      color: var(--text-dimmer);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-left: 6px;
    }
    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 0;
      justify-content: flex-end;
    }
    .file-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 7px 13px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-dim);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .file-btn:hover { color: var(--text); border-color: var(--text-dimmer); }
    .file-btn input[type="file"] { display: none; }
    .search-wrap {
      position: relative;
      flex: 1;
      max-width: 320px;
      min-width: 140px;
    }
    .search-wrap input {
      width: 100%;
      padding: 7px 12px 7px 32px;
      font-family: inherit;
      font-size: 13px;
      color: var(--text);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      outline: none;
      transition: border-color 0.15s;
    }
    .search-wrap input:focus { border-color: var(--user); }
    .search-wrap input::placeholder { color: var(--text-dimmer); }
    .search-wrap::before {
      content: "";
      position: absolute;
      left: 11px; top: 50%; transform: translateY(-50%);
      width: 13px; height: 13px;
      background: no-repeat center / contain url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236a7790' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round'><circle cx='11' cy='11' r='7'/><line x1='21' y1='21' x2='16.65' y2='16.65'/></svg>");
      pointer-events: none;
    }
    .stats {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-dimmer);
      letter-spacing: 0.02em;
      white-space: nowrap;
    }
    .stats strong {
      color: var(--text-dim);
      font-weight: 600;
    }

    /* ---- Progress ---- */
    .progress {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 14px 20px;
      background: var(--bg);
      border-bottom: 1px solid var(--border-soft);
    }
    .progress[hidden] { display: none; }
    .progress .label {
      font-size: 12px;
      color: var(--text-dim);
      margin-bottom: 8px;
      font-family: var(--font-mono);
      letter-spacing: 0.02em;
    }
    .progress .track {
      height: 3px;
      background: var(--surface-2);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress .bar {
      height: 100%;
      background: linear-gradient(90deg, var(--user), var(--model));
      width: 0%;
      transition: width 0.2s ease-out;
    }

    /* ---- Main / Empty state ---- */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 20px 80px;
    }
    body.dragging::after {
      content: "Drop conversation file here";
      position: fixed;
      inset: 0;
      z-index: 200;
      background: color-mix(in oklab, var(--user) 12%, var(--bg));
      border: 2px dashed var(--user);
      display: grid;
      place-items: center;
      font-family: var(--font-serif);
      font-size: 28px;
      color: var(--user);
      pointer-events: none;
    }

    .empty {
      max-width: var(--col-width);
      margin: 80px auto;
      text-align: center;
    }
    .empty h1 {
      font-family: var(--font-serif);
      font-size: clamp(28px, 5vw, 42px);
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
      margin: 0 0 16px;
    }
    .empty h1 em {
      color: var(--user);
      font-style: normal;
      font-weight: 400;
    }
    .empty p {
      font-size: 16px;
      color: var(--text-dim);
      max-width: 50ch;
      margin: 0 auto 28px;
      line-height: 1.65;
    }
    .empty .drop-zone {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 22px;
      font-size: 15px;
      font-weight: 500;
      color: var(--user);
      background: var(--user-bg);
      border: 1px solid color-mix(in oklab, var(--user) 30%, transparent);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .empty .drop-zone:hover {
      background: color-mix(in oklab, var(--user) 12%, transparent);
      border-color: var(--user);
    }
    .empty .drop-zone input { display: none; }
    .empty .meta {
      margin-top: 32px;
      font-size: 12px;
      color: var(--text-dimmer);
      font-family: var(--font-mono);
      letter-spacing: 0.02em;
    }

    /* ---- Conversation ---- */
    .conversation {
      display: flex;
      flex-direction: column;
      gap: 28px;
      max-width: var(--col-width);
      margin: 0 auto;
    }
    .msg {
      content-visibility: auto;
      contain-intrinsic-size: auto 420px;
      position: relative;
      padding: 18px 22px 20px 22px;
      border-radius: 12px;
      border: 1px solid var(--border-soft);
      background: var(--surface);
      transition: border-color 0.15s;
    }
    .msg.hidden { display: none; }
    .msg:hover { border-color: var(--border); }

    .msg.is-user {
      border-left: 3px solid var(--user);
      background: linear-gradient(90deg, var(--user-bg), var(--surface) 30%);
    }
    .msg.is-model {
      border-left: 3px solid var(--model);
    }
    .msg.msg-thinking {
      background: var(--thinking-bg);
      border: 1px dashed color-mix(in oklab, var(--thinking) 50%, transparent);
      padding: 12px 18px;
      gap: 0;
    }
    .msg.msg-thinking .msg-body { display: none; }
    .msg.msg-thinking.is-open { padding-bottom: 16px; }
    .msg.msg-thinking.is-open .msg-body { display: block; }
    .msg.msg-thinking.is-open .chev { transform: rotate(90deg); }

    .msg.msg-drive-image {
      background: transparent;
      border: none;
      padding: 0;
      text-align: center;
    }

    .msg-meta {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 12px;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text-dimmer);
    }
    .msg-meta .role {
      font-weight: 600;
      letter-spacing: 0.08em;
    }
    .is-user .msg-meta .role { color: var(--user); }
    .is-model .msg-meta .role { color: var(--model); }
    .msg-meta time { color: var(--text-dimmer); }
    .msg-meta .tok {
      margin-left: auto;
      color: var(--text-dimmer);
    }

    .thinking-toggle {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 0;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--thinking);
      background: none;
      border: none;
      cursor: pointer;
      text-align: left;
    }
    .thinking-toggle:hover { color: var(--text-dim); }
    .thinking-toggle .chev {
      display: inline-block;
      transition: transform 0.15s;
      font-size: 9px;
    }
    .thinking-toggle .label { flex: 1; }
    .thinking-toggle .tok {
      font-weight: 400;
      letter-spacing: 0.04em;
      color: var(--text-dimmer);
    }
    .thinking-body {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px dashed color-mix(in oklab, var(--thinking) 40%, transparent);
      color: var(--text-dim);
      font-style: italic;
    }
    .thinking-body strong { color: var(--text-dim); font-style: normal; }

    .drive-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-dimmer);
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: 20px;
    }

    /* ---- Prose (markdown) ---- */
    .prose {
      font-family: var(--font-serif);
      font-size: 17px;
      line-height: 1.7;
      color: var(--text);
      word-wrap: break-word;
      overflow-wrap: break-word;
    }
    .prose > *:first-child { margin-top: 0; }
    .prose > *:last-child { margin-bottom: 0; }
    .prose p { margin: 0 0 1em; }
    .prose h1, .prose h2, .prose h3, .prose h4, .prose h5, .prose h6 {
      font-family: var(--font-sans);
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text);
      margin: 1.6em 0 0.6em;
      line-height: 1.3;
    }
    .prose h1 { font-size: 1.5em; }
    .prose h2 { font-size: 1.3em; }
    .prose h3 { font-size: 1.15em; color: var(--user); }
    .prose h4 { font-size: 1em; color: var(--model); }
    .prose h5, .prose h6 { font-size: 0.95em; color: var(--text-dim); }
    .prose strong { color: var(--text); font-weight: 600; }
    .prose em { color: inherit; }
    .prose a {
      color: var(--link);
      text-decoration: underline;
      text-decoration-color: color-mix(in oklab, var(--link) 30%, transparent);
      text-underline-offset: 3px;
      transition: text-decoration-color 0.15s;
    }
    .prose a:hover { text-decoration-color: var(--link); }
    .prose ul, .prose ol { margin: 0 0 1em; padding-left: 1.5em; }
    .prose ul { list-style: none; }
    .prose ul > li { position: relative; }
    .prose ul > li::before {
      content: "—";
      position: absolute;
      left: -1.4em;
      color: var(--text-dimmer);
    }
    .prose ol > li { margin-bottom: 0.3em; }
    .prose ol > li::marker { color: var(--text-dimmer); font-family: var(--font-mono); font-size: 0.9em; }
    .prose li { margin-bottom: 0.4em; }
    .prose blockquote {
      margin: 1.2em 0;
      padding: 0 0 0 1.2em;
      border-left: 2px solid var(--model);
      color: var(--text-dim);
      font-style: italic;
    }
    .prose hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2em 0;
    }
    .prose code {
      font-family: var(--font-mono);
      font-size: 0.9em;
      color: var(--user);
      background: var(--code-bg);
      padding: 1px 6px;
      border-radius: 4px;
      border: 1px solid var(--border-soft);
    }
    .prose pre {
      margin: 1.2em 0;
      padding: 14px 16px;
      background: var(--code-bg);
      border: 1px solid var(--border-soft);
      border-radius: 8px;
      overflow-x: auto;
      line-height: 1.5;
    }
    .prose pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: 13px;
      color: var(--text);
    }
    .prose table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.2em 0;
      font-family: var(--font-sans);
      font-size: 14px;
    }
    .prose th, .prose td {
      padding: 8px 12px;
      border: 1px solid var(--border);
      text-align: left;
    }
    .prose th {
      background: var(--surface-2);
      font-weight: 600;
      color: var(--text-dim);
    }
    .prose img {
      max-width: 100%;
      height: auto;
      border-radius: 6px;
    }

    /* Mobile tweaks */
    @media (max-width: 640px) {
      :root { --col-width: 100%; }
      .topbar { padding: 10px 14px; }
      .topbar-row { gap: 10px; }
      .brand { font-size: 17px; }
      .brand small { display: none; }
      .stats { display: none; }
      main { padding: 20px 14px 60px; }
      .msg { padding: 16px 18px; }
      .prose { font-size: 16px; line-height: 1.65; }
      .conversation { gap: 20px; }
    }
  </style>
</head>
<body>
  <div id="progress" class="progress" hidden>
    <div class="label">Loading…</div>
    <div class="track"><div class="bar"></div></div>
  </div>

  <header class="topbar">
    <div class="topbar-row">
      <div class="brand"><span class="dot"></span>Token Viewer<small>offline</small></div>
      <div class="toolbar">
        <div id="header-info" hidden>
          <span class="stats"><strong id="count">0</strong> msgs · <strong id="total-tokens">0</strong> tokens</span>
        </div>
        <div class="search-wrap">
          <input id="search" type="search" placeholder="Search…" autocomplete="off" spellcheck="false" />
        </div>
        <label class="file-btn">
          Open
          <input id="file-input" type="file" accept=".json,application/json,*" />
        </label>
      </div>
    </div>
  </header>

  <main>
    <section id="empty-state" class="empty">
      <h1>Read your AI Studio<br/><em>conversations offline.</em></h1>
      <p>A polished, lag-free viewer for Google AI Studio chat exports. Pre-renders the entire transcript, lets you search instantly, and works in airplane mode once installed.</p>
      <label class="drop-zone">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Open a conversation
        <input type="file" accept=".json,application/json,*" data-secondary-input />
      </label>
      <div class="meta">JSON · drag and drop also works</div>
    </section>

    <section id="conversation" class="conversation"></section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  <script>
    (() => {
      const $ = (s, root = document) => root.querySelector(s);
      const $$ = (s, root = document) => Array.from(root.querySelectorAll(s));

      const fileInput = $('#file-input');
      const secondaryInput = $('[data-secondary-input]');
      const progressEl = $('#progress');
      const conversation = $('#conversation');
      const searchInput = $('#search');
      const countEl = $('#count');
      const totalTokensEl = $('#total-tokens');
      const headerInfo = $('#header-info');
      const emptyState = $('#empty-state');

      let allChunks = [];
      let highlightObserver = null;

      if (window.marked) {
        marked.setOptions({ gfm: true, breaks: false, mangle: false, headerIds: false });
      }

      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js').catch(err => console.warn('SW failed:', err));
        });
      }

      fileInput.addEventListener('change', (e) => {
        const f = e.target.files[0];
        if (f) loadFile(f);
      });
      secondaryInput?.addEventListener('change', (e) => {
        const f = e.target.files[0];
        if (f) loadFile(f);
      });

      let dragCounter = 0;
      window.addEventListener('dragenter', (e) => {
        e.preventDefault();
        dragCounter++;
        document.body.classList.add('dragging');
      });
      window.addEventListener('dragleave', (e) => {
        e.preventDefault();
        dragCounter--;
        if (dragCounter <= 0) {
          dragCounter = 0;
          document.body.classList.remove('dragging');
        }
      });
      window.addEventListener('dragover', (e) => { e.preventDefault(); });
      window.addEventListener('drop', (e) => {
        e.preventDefault();
        dragCounter = 0;
        document.body.classList.remove('dragging');
        const f = e.dataTransfer?.files?.[0];
        if (f) loadFile(f);
      });

      async function loadFile(file) {
        if (highlightObserver) { highlightObserver.disconnect(); highlightObserver = null; }
        try {
          showProgress(0.02, 'Reading file…');
          await raf();
          const text = await file.text();

          showProgress(0.12, 'Parsing JSON…');
          await raf();
          const data = JSON.parse(text);
          const rawChunks = data?.chunkedPrompt?.chunks;
          if (!Array.isArray(rawChunks)) {
            throw new Error('Not a Google AI Studio export — expected chunkedPrompt.chunks array.');
          }

          showProgress(0.18, 'Normalizing…');
          await raf();
          const normalized = rawChunks.map((c, i) => normalize(c, i));

          await preparseMarkdown(normalized);

          showProgress(0.97, 'Mounting…');
          await raf();
          allChunks = normalized;
          mountConversation(allChunks);
          updateHeader();
          searchInput.value = '';
          hideProgress();
        } catch (err) {
          hideProgress();
          console.error(err);
          alert('Could not load file:\n' + err.message);
        }
      }

      function normalize(c, idx) {
        const role = c.role || 'user';
        let kind, text = '';
        if (c.driveImage) {
          kind = 'drive-image';
        } else if (c.isThought) {
          kind = 'thinking';
          text = (c.parts || []).map(p => p.text || '').join('').trim();
          if (!text) text = (c.text || '').trim();
        } else {
          kind = 'message';
          text = (c.text || (c.parts || []).map(p => p.text || '').join('')).trim();
        }
        return {
          idx,
          role,
          kind,
          text,
          html: '',
          normText: text.toLowerCase(),
          tokens: c.tokenCount || 0,
          createTime: c.createTime || null,
          driveImageId: c.driveImage?.id || null,
          finishReason: c.finishReason || null,
        };
      }

      async function preparseMarkdown(chunks) {
        const total = chunks.length;
        const batchSize = 30;
        for (let i = 0; i < total; i += batchSize) {
          const end = Math.min(i + batchSize, total);
          for (let j = i; j < end; j++) {
            const c = chunks[j];
            if (c.kind === 'message' || c.kind === 'thinking') {
              try {
                c.html = DOMPurify.sanitize(marked.parse(c.text || ''));
              } catch (e) {
                c.html = DOMPurify.sanitize(`<p>${escapeHtml(c.text || '')}</p>`);
              }
            }
          }
          const ratio = 0.2 + 0.75 * (end / total);
          showProgress(ratio, `Rendering markdown · ${end}/${total}`);
          await raf();
        }
      }

      function mountConversation(chunks) {
        conversation.innerHTML = '';
        const frag = document.createDocumentFragment();
        for (const c of chunks) frag.appendChild(renderChunk(c));
        conversation.appendChild(frag);
        emptyState.hidden = true;
        setupSyntaxHighlighting();
      }

      function renderChunk(c) {
        const art = document.createElement('article');
        art.className = `msg msg-${c.kind} ${c.role === 'user' ? 'is-user' : 'is-model'}`;
        art.dataset.idx = c.idx;

        if (c.kind === 'drive-image') {
          const span = document.createElement('span');
          span.className = 'drive-badge';
          span.innerHTML = `<span aria-hidden="true">📎</span> Drive image · <span style="font-family:var(--font-mono);">${escapeHtml(c.driveImageId || '')}</span>`;
          art.appendChild(span);
          return art;
        }

        if (c.kind === 'thinking') {
          const btn = document.createElement('button');
          btn.className = 'thinking-toggle';
          btn.type = 'button';
          btn.innerHTML = `
            <span class="chev">▶</span>
            <span class="label">Thinking</span>
            <span class="tok">${c.tokens ? c.tokens.toLocaleString() + ' tok' : ''}</span>
          `;
          btn.addEventListener('click', () => art.classList.toggle('is-open'));
          art.appendChild(btn);
          const body = document.createElement('div');
          body.className = 'msg-body thinking-body prose';
          body.innerHTML = c.html;
          art.appendChild(body);
          return art;
        }

        const meta = document.createElement('header');
        meta.className = 'msg-meta';
        const roleLabel = c.role === 'user' ? 'You' : 'Model';
        meta.innerHTML = `
          <span class="role">${roleLabel}</span>
          ${c.createTime ? `<time datetime="${escapeHtml(c.createTime)}">${formatTime(c.createTime)}</time>` : ''}
          ${c.tokens ? `<span class="tok">${c.tokens.toLocaleString()} tok</span>` : ''}
        `;
        art.appendChild(meta);
        const body = document.createElement('div');
        body.className = 'msg-body prose';
        body.innerHTML = c.html;
        art.appendChild(body);
        return art;
      }

      function setupSyntaxHighlighting() {
        if (!window.hljs) return;
        highlightObserver = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              entry.target.querySelectorAll('pre code:not([data-highlighted])').forEach(el => {
                try { hljs.highlightElement(el); el.dataset.highlighted = '1'; } catch (_) {}
              });
              highlightObserver.unobserve(entry.target);
            }
          });
        }, { rootMargin: '400px 0px' });
        $$('article.msg').forEach(el => highlightObserver.observe(el));
      }

      let searchDebounce = null;
      searchInput.addEventListener('input', () => {
        clearTimeout(searchDebounce);
        searchDebounce = setTimeout(applySearch, 80);
      });

      function applySearch() {
        const q = searchInput.value.trim().toLowerCase();
        const articles = $$('article.msg', conversation);
        let visible = 0;
        for (const el of articles) {
          const idx = +el.dataset.idx;
          const c = allChunks[idx];
          let match = !q;
          if (q && c) {
            match = (c.normText && c.normText.includes(q)) ||
                    (c.driveImageId && c.driveImageId.toLowerCase().includes(q));
          }
          el.classList.toggle('hidden', !match);
          if (match) visible++;
        }
        if (q) {
          countEl.textContent = `${visible}/${articles.length}`;
        } else {
          countEl.textContent = `${articles.length}`;
        }
      }

      function updateHeader() {
        headerInfo.hidden = false;
        const total = allChunks.length;
        const totalTokens = allChunks.reduce((s, c) => s + (c.tokens || 0), 0);
        countEl.textContent = total.toLocaleString();
        totalTokensEl.textContent = totalTokens.toLocaleString();
      }

      function showProgress(ratio, label) {
        progressEl.hidden = false;
        progressEl.querySelector('.bar').style.width = (Math.max(0, Math.min(1, ratio)) * 100) + '%';
        progressEl.querySelector('.label').textContent = label;
      }
      function hideProgress() { progressEl.hidden = true; }

      function formatTime(iso) {
        try {
          const d = new Date(iso);
          if (isNaN(d.getTime())) return '';
          return d.toLocaleString(undefined, {
            month: 'short', day: 'numeric',
            hour: '2-digit', minute: '2-digit'
          });
        } catch { return ''; }
      }

      function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, c => ({
          '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
        }[c]));
      }

      function raf() { return new Promise(r => setTimeout(r, 0)); }
    })();
  </script>
</body>
</html>
